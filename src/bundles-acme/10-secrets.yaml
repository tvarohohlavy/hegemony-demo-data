# Acme's own SSH credential, confined to orgs/acme/... . No other tenant can
# read or enumerate it — secret access is org-scoped, and only the shared
# namespace is additionally visible cross-org. Synthetic.

schema_version: 2

secrets:
  - name: acme-store-ssh
    description: SSH login for Acme's retail-store routers.
    folder: orgs/acme/secrets/store/ssh
    values:
      username: acme-netops
      password: demo-acme-store-password
