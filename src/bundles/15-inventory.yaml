# Meridian Networks' production estate: a regional site hierarchy with hub
# datacenters and campuses. All management addresses are RFC 5737 TEST-NET-1
# (192.0.2.0/24) and never route anywhere — this inventory is a browsing and
# targeting showcase, not a set of reachable devices. The reachable devices
# live in the "Virtual Lab" site and are synced from Git by the inventory
# provider (see 25-inventory-providers.yaml), not declared here.
#
# Access configuration deliberately mixes two credential styles:
#   * out-of-band / global devices resolve SSH from environment variables,
#   * every hub device resolves SSH (and enable) from the vault-backed
#     meridian-prod-ssh secret, to showcase vault:// access references.

schema_version: 2

sites:
  - name: Meridian Global
    description: Root of the Meridian Networks site hierarchy.
    location: global
    tags:
      env: demo
      tier: global
      site_type: root
  - name: Americas
    description: Americas regional aggregation.
    location: americas
    parent: Meridian Global
    tags:
      env: demo
      region: americas
      site_type: region
  - name: EMEA
    description: EMEA regional aggregation.
    location: emea
    parent: Meridian Global
    tags:
      env: demo
      region: emea
      site_type: region
  - name: APAC
    description: APAC regional aggregation.
    location: apac
    parent: Meridian Global
    tags:
      env: demo
      region: apac
      site_type: region
  - name: NYC1
    description: New York hub datacenter.
    location: new-york
    parent: Meridian Global/Americas
    tags:
      env: demo
      region: americas
      hub: nyc1
      site_type: datacenter
  - name: SJC1
    description: San Jose campus.
    location: san-jose
    parent: Meridian Global/Americas
    tags:
      env: demo
      region: americas
      hub: sjc1
      site_type: campus
  - name: PRG1
    description: Prague headquarters datacenter.
    location: prague
    parent: Meridian Global/EMEA
    tags:
      env: demo
      region: emea
      hub: prg1
      site_type: datacenter
  - name: AMS1
    description: Amsterdam hub datacenter.
    location: amsterdam
    parent: Meridian Global/EMEA
    tags:
      env: demo
      region: emea
      hub: ams1
      site_type: datacenter
  - name: LON1
    description: London campus.
    location: london
    parent: Meridian Global/EMEA
    tags:
      env: demo
      region: emea
      hub: lon1
      site_type: campus
  - name: SIN1
    description: Singapore hub datacenter.
    location: singapore
    parent: Meridian Global/APAC
    tags:
      env: demo
      region: apac
      hub: sin1
      site_type: datacenter
  - name: SYD1
    description: Sydney campus.
    location: sydney
    parent: Meridian Global/APAC
    tags:
      env: demo
      region: apac
      hub: syd1
      site_type: campus
  # The "Virtual Lab" site and its four routers are intentionally NOT declared
  # here — they are owned and created by the git inventory provider from the
  # seeded source-of-truth repository (see 25-inventory-providers.yaml and the
  # demo-inventory/ tree). Run "Lab: Bootstrap demo datacenter" to populate them.

devices:
  # --- Out-of-band management (environment-variable credentials) -------------
  - name: mer-oob-01
    mgmt_host: 192.0.2.10
    vendor: Cisco
    platform: ios-xe
    model: C8300-1N1S-4T2X
    current_version: 17.12.4
    site: Meridian Global
    access_config:
      ssh:
        username_ref: "{{ env('HEGEMONY_SSH_USERNAME') }}"
        password_ref: "{{ env('HEGEMONY_SSH_PASSWORD') }}"
    tags:
      role: oob
      env: demo
      region: global
  - name: mer-oob-02
    mgmt_host: 192.0.2.11
