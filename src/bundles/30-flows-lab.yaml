  - flow: "Lab: Provision and tear down demo datacenter"
    filename: frr/dc1-acc-01.conf
    content_file: src/files/lab/frr/dc1-acc-01.conf
  - flow: "Lab: Provision and tear down demo datacenter"
    filename: frr/dc1-acc-02.conf
    content_file: src/files/lab/frr/dc1-acc-02.conf
  - flow: "Lab: Provision and tear down demo datacenter"
    filename: frr/dc2-core-01.conf
    content_file: src/files/lab/frr/dc2-core-01.conf
  - flow: "Lab: Provision and tear down demo datacenter"
