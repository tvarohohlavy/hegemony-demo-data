# Global variables model the standing facts of the fictional operator
# "Meridian Networks": organisation identity, the change process, and the
# addresses of shared infrastructure. Flows, container env, and rendered
# device config all read these through {{ vars.NAME }} so a single edit
# re-labels the whole demo.

schema_version: 2

variables:
  # --- Organisation identity -------------------------------------------------
  - name: ORG_NAME
    value: Meridian Networks
    description: Fictional operator name surfaced in flow output and notifications.
  - name: NOC_CONTACT
    value: noc@meridian.example
    description: Network Operations Center contact address for change records.
  - name: MAINT_WINDOW
    value: "Sun 02:00-04:00 UTC"
    description: Standard maintenance window, recorded in backup manifests.

  # --- Demo datacenter (Gitea + containerlab), bootstrapped by a flow --------
  - name: GITEA_HOST
    value: localhost
    description: >-
      Host that publishes the demo Gitea service. The flows that reach Gitea run
      as host-networked containers, so localhost:3000 addresses it directly.
  - name: GITEA_PORT
    value: "3000"
    description: Published port of the demo Gitea service.
  - name: GITEA_ORG
    value: meridian
    description: Gitea organisation that owns the source-of-truth and backup repos.
  - name: GITEA_URL
    value: "http://{{ vars.GITEA_HOST }}:{{ vars.GITEA_PORT }}"
    description: Base URL of the demo Gitea service (composed from GITEA_HOST/PORT).
  - name: LAB_MGMT_SUBNET
    value: 172.20.30.0/24
    description: Management subnet containerlab assigns to the FRR lab routers.

  # --- Shared network services (org standards) --------------------------------
  # The NTP/DNS/SYSLOG standards now live in the SHARED org (Shared Standards),
  # so every org — Meridian's own default org included — reads the same golden
  # values through the shared read-through. Meridian's backup flow references
  # {{ vars.NTP_PRIMARY }} et al. and resolves them from the shared org at run
  # time; see src/bundles-shared/05-variables.yaml. The variable picker shows
  # them with a "shared organization" marker.
