# Demo inventory providers. All providers are imported DISABLED so the demo
# stack stays self-contained: operators can edit the config (point at a real
# NetBox / Infrahub / Git repo) and flip `enabled: true` from the UI before
# Hegemony starts polling.

schema_version: 2

inventory_providers:
  - name: demo-netbox
    provider_type: netbox
    enabled: false
    config:
      url: http://host.docker.internal:8001/
      token_ref:
        "{{ secret('vault://orgs/default/secrets/netbox-local-api-token/token') }}"
      auth_scheme: Bearer
      verify_tls: false
  - name: demo-infrahub
    provider_type: infrahub
    enabled: false
    description: Example Infrahub provider wiring (disabled by default).
    config:
      url: https://infrahub.demo.invalid
      token_ref: "{{ env('HEGEMONY_DEMO_INFRAHUB_TOKEN') }}"
      verify_tls: true
      branch: main
      device_kind: InfraDevice
