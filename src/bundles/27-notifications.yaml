schema_version: 2

notification_destinations:
  - name: "Demo Email: NetOps"
    type: email
    enabled: true
    config_json:
      to:
        - netops@example.invalid
        - noc@example.invalid
      cc:
        - manager@example.invalid
      from: hegemony-demo@example.invalid
      smtp_host_ref: "{{ env('HEGEMONY_DEMO_SMTP_HOST', 'demo-notification-smtp') }}"
      smtp_port_ref: "{{ env('HEGEMONY_DEMO_SMTP_PORT', '1025') }}"
      smtp_use_tls_ref: "{{ env('HEGEMONY_DEMO_SMTP_USE_TLS', 'false') }}"
      smtp_use_starttls_ref: "{{ env('HEGEMONY_DEMO_SMTP_USE_STARTTLS', 'false') }}"
  - name: "Demo Email: Security"
    type: email
    enabled: true
    config_json:
      to:
        - security@example.invalid
      from: security-demo@example.invalid
      smtp_host_ref: "{{ env('HEGEMONY_DEMO_SMTP_HOST', 'demo-notification-smtp') }}"
      smtp_port_ref: "{{ env('HEGEMONY_DEMO_SMTP_PORT', '1025') }}"
      smtp_use_tls_ref: "{{ env('HEGEMONY_DEMO_SMTP_USE_TLS', 'false') }}"
      smtp_use_starttls_ref: "{{ env('HEGEMONY_DEMO_SMTP_USE_STARTTLS', 'false') }}"
  - name: "Demo Webhook: Generic JSON"
    type: outgoing_webhook
    enabled: true
    config_json:
      url: https://demo-notifications.invalid/webhooks/generic-json
      method: POST
      headers:
        X-Demo-Receiver: synthetic
      timeout_seconds: 5
      retry_count: 0
      verify_tls: true
      auth_type: none
  - name: "Demo Webhook: Microsoft Teams"
    type: outgoing_webhook
    enabled: true
    config_json:
      url: https://demo-notifications.invalid/webhooks/teams
      method: POST
      headers:
        X-Demo-Receiver: synthetic-teams
      payload_template: |
        {
          "@type": "MessageCard",
          "@context": "https://schema.org/extensions",
          "summary": "{{title}}",
          "themeColor": "0078D4",
          "title": "{{title}}",
          "text": "{{body}}"
        }
      timeout_seconds: 5
      retry_count: 0
      verify_tls: true
      auth_type: none
  - name: "Demo Webhook: Signed HMAC"
    type: outgoing_webhook
    enabled: true
    config_json:
      url: https://demo-notifications.invalid/webhooks/signed
      method: POST
      headers:
        X-Demo-Receiver: synthetic-signed
      timeout_seconds: 5
      retry_count: 0
      verify_tls: true
      auth_type: none
      signing:
        algorithm: hmac-sha256
        secret_ref: "{{ secret('vault://orgs/default/secrets/demo/integrations/webhook/signing_secret') }}"
        signature_header: X-Demo-Signature
        timestamp_header: X-Demo-Timestamp
        signed_content: timestamp_dot_body
        prefix: "sha256="
  - name: "Demo Shoutrrr: Discord"
    type: shoutrrr
    enabled: true
    config_json:
      url_secret: "{{ secret('vault://orgs/default/secrets/demo/integrations/shoutrrr/discord_url') }}"
      title: Hegemony Demo Discord
  - name: "Demo Shoutrrr: Slack"
    type: shoutrrr
    enabled: true
    config_json:
      url_secret: "{{ secret('vault://orgs/default/secrets/demo/integrations/shoutrrr/slack_url') }}"
      title: Hegemony Demo Slack
  - name: "Demo Shoutrrr: Teams"
    type: shoutrrr
    enabled: true
    config_json:
      url_secret: "{{ secret('vault://orgs/default/secrets/demo/integrations/shoutrrr/teams_url') }}"
      title: Hegemony Demo Teams
  - name: "Demo Shoutrrr: Telegram"
    type: shoutrrr
    enabled: true
    config_json:
      url_secret: "{{ secret('vault://orgs/default/secrets/demo/integrations/shoutrrr/telegram_url') }}"
      title: Hegemony Demo Telegram
  - name: "Demo Shoutrrr: Ntfy"
    type: shoutrrr
    enabled: true
    config_json:
      url_secret: "{{ secret('vault://orgs/default/secrets/demo/integrations/shoutrrr/ntfy_url') }}"
      title: Hegemony Demo Ntfy

flow_subscriptions:
  - flow: "Demo: parallel site readiness"
    destination: "Demo Email: NetOps"
    event: run.completed
    enabled: true
  - flow: "Demo: parallel site readiness"
    destination: "Demo Email: Security"
    event: run.completed
    enabled: true
  - flow: "Demo: parallel site readiness"
    destination: "Demo Webhook: Generic JSON"
    event: run.completed
    enabled: false
  - flow: "Demo: parallel site readiness"
    destination: "Demo Webhook: Microsoft Teams"
    event: run.completed
    enabled: false
  - flow: "Demo: parallel site readiness"
    destination: "Demo Webhook: Signed HMAC"
    event: run.completed
    enabled: false
  - flow: "Demo: parallel site readiness"
    destination: "Demo Shoutrrr: Discord"
    event: run.completed
    enabled: false
  - flow: "Demo: parallel site readiness"
    destination: "Demo Shoutrrr: Slack"
    event: run.completed
    enabled: false
  - flow: "Demo: parallel site readiness"
    destination: "Demo Shoutrrr: Teams"
    event: run.completed
    enabled: false
  - flow: "Demo: parallel site readiness"
    destination: "Demo Shoutrrr: Telegram"
    event: run.completed
    enabled: false
  - flow: "Demo: parallel site readiness"
    destination: "Demo Shoutrrr: Ntfy"
    event: run.completed
    enabled: false
