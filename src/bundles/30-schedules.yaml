schema_version: 2

schedules:
  - name: Every 6h readiness sweep (demo)
    flow: "Demo: parallel site readiness"
    schedule_type: recurring
    interval_seconds: 21600
    timezone: UTC
    params:
      trigger_source: interval-demo
      scope: global-readiness
    enabled: true
  - name: Daily readiness report (demo)
    flow: "Demo: parallel site readiness"
    schedule_type: recurring
    cron_expression: "0 8 * * *"
    timezone: UTC
    params:
      trigger_source: cron-demo
      report: daily-readiness
    enabled: true
  - name: Weekday branch rollout rehearsal (demo)
    flow: "Demo: staged branch rollout"
    schedule_type: recurring
    cron_expression: "30 7 * * 1-5"
    timezone: UTC
    params:
      trigger_source: cron-demo
      rollout_mode: weekday-rehearsal
    enabled: false
  - name: Hourly container render rehearsal (demo)
    flow: "Demo: containerized config render"
    schedule_type: recurring
    interval_seconds: 3600
    timezone: UTC
    params:
      trigger_source: interval-demo
      render_mode: candidate-config
    enabled: true
  - name: Weekly GitOps drift dry-run (demo)
    flow: "Demo: containerized config render"
    schedule_type: recurring
    cron_expression: "0 3 * * 1"
    timezone: UTC
    params:
      trigger_source: cron-demo
      drift_scope: gitops-weekly
    enabled: false
  - name: Monthly compliance rehearsal (demo)
    flow: "Demo: parallel site readiness"
    schedule_type: recurring
    cron_expression: "0 9 1 * *"
    timezone: UTC
    params:
      trigger_source: cron-demo
      compliance_scope: monthly
    enabled: false
  - name: Future migration rehearsal (demo)
    flow: "Demo: staged branch rollout"
    schedule_type: one_time
    run_at: "2029-05-16T09:00:00+00:00"
    timezone: UTC
    params:
      trigger_source: one-time-demo
      migration_wave: future-core-refresh
    enabled: true
  - name: Weekly containerlab rehearsal (demo)
    flow: "Demo: containerlab parallel lab"
    schedule_type: recurring
    cron_expression: "0 4 * * 2"
    timezone: UTC
    params:
      trigger_source: cron-demo
      lab_scope: containerlab-weekly
    enabled: false
