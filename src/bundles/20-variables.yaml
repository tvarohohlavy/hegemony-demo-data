schema_version: 2

variables:
  - name: DEMO_ENV
    value: demo
    description: Demo environment label used by seeded flows.
  - name: DEMO_RUN_LABEL
    value: turnkey-demo
    description: Human-friendly run label used in demo step messages.
  - name: DEMO_REGION_PRIMARY
    value: us-west
    description: Primary demo region used by the Americas readiness examples.
  - name: DEMO_REGION_BRANCH
    value: us-east
    description: Secondary demo region used by the APAC/branch rollout examples.
  - name: DEMO_MAINTENANCE_WINDOW
    value: Sun 08:00 UTC
    description: Example maintenance window referenced by demo flows.
  - name: DEMO_CONTACT
    value: NetOps Demo Team
    description: Example owner/contact surfaced in demo flow output.
  - name: DEMO_CHANGE_ID
    value: CHG-DEMO-0001
    description: Example change identifier referenced in demo flow output.
  - name: DEMO_SLEEP_MESSAGE
    value: "Hello from {{ vars.DEMO_RUN_LABEL }}"
    description: Nested variable reference used by staged rollout wait steps.
  - name: DEMO_PREPARE_MESSAGE
    value: "Preparing {{ vars.DEMO_ENV }} automation in {{ vars.DEMO_REGION_PRIMARY }}"
    description: Prepare-step message for the staged rollout flow.
  - name: DEMO_VERIFY_MESSAGE
    value: "Verifying {{ vars.DEMO_ENV }} automation for {{ vars.DEMO_REGION_BRANCH }}"
    description: Verify-step message for the staged rollout flow.
