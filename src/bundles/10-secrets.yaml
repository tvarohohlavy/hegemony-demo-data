# Secrets are import-only: values are written to the configured backend and
# only the key names are ever visible again. Everything here is synthetic.
# Other resources reference these by vault:// path, e.g.
#   {{ secret('vault://orgs/default/secrets/meridian/lab/ssh/password') }}
# so no plaintext credential appears outside this file.

schema_version: 2

secrets:
  # Credentials for the demo Gitea service the Bootstrap flow stands up. Used to
  # provision the admin account and to authenticate the config-backup push
  # (HTTP basic auth: username + password) from inside the backup flow's
  # container.
  - name: meridian-gitea-admin
    description: Admin account for the demo Gitea service.
    folder: orgs/default/secrets/meridian/gitea/admin
    values:
      username: meridian-admin
      password: demo-gitea-admin-password

  # SSH credentials for the FRR lab routers (built with an sshd wrapper).
  # Referenced by the git inventory provider's default_access_config and by
  # the device records in demo-inventory/.
  - name: meridian-lab-ssh
    description: SSH login for the containerlab FRR routers.
    folder: orgs/default/secrets/meridian/lab/ssh
    values:
      username: clab
      password: demo-lab-password

  # SSH/enable credentials for the (unreachable) production estate. Most
  # static devices reference these instead of environment variables to
  # showcase vault-backed access configuration.
  - name: meridian-prod-ssh
    description: SSH + enable credentials for the production device estate.
    folder: orgs/default/secrets/meridian/prod/ssh
    values:
      username: netops
      password: demo-prod-password
      enable_password: demo-prod-enable

  # HMAC signing material for inbound webhooks and the signed outbound webhook.
  - name: meridian-webhook-hmac
    description: Shared HMAC signing secret for demo webhooks.
    folder: orgs/default/secrets/meridian/integrations/webhook
    values:
      signing_secret: demo-webhook-hmac-secret
      header: X-Meridian-Signature

  # Tokens/URLs for the notification-channel examples. The chat-service
  # destinations use preset destination types (discord/slack/telegram/teams/
  # webex) that take a token or URL secret reference; ntfy has no preset and
  # uses a raw Shoutrrr URL. All hosts are RFC 2606 / .invalid so nothing can
  # actually be delivered.
  - name: meridian-notify
    description: Tokens and URLs for demo notification destinations.
    folder: orgs/default/secrets/meridian/integrations/notify
    values:
      discord_token: demo-discord-webhook-token
      slack_token: demo-token-a/demo-token-b/demo-token-c
      telegram_token: demo-telegram-bot-token
      teams_url: https://meridian-notify.invalid/teams/workflow?sig=demo
      webex_token: demo-webex-incoming-token
      ntfy_url: ntfy://meridian-notify.invalid/meridian-demo?scheme=https

  # API token for the disabled NetBox inventory-provider wiring example.
  - name: meridian-netbox-token
    description: API token for the disabled NetBox inventory-provider example.
    folder: orgs/default/secrets/meridian/integrations/netbox
    values:
      token: DEMO_NETBOX_API_TOKEN_PLACEHOLDER
