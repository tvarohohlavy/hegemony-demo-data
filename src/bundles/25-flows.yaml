webhooks:
  - name: "Demo Webhook: CI change approved"
    description: Synthetic CI/CD approval event that fans out readiness checks and renders a candidate plan.
    flows:
      - "Demo: parallel site readiness"
      - "Demo: containerized config render"
    auth_mode: hmac_sha256
    replay_window_seconds: 300
    rate_limit_per_minute: 30
    allowed_source_ips:
      - 192.0.2.0/24
      - 198.51.100.0/24
    payload_mapping:
      run_name: $.change.summary
      params:
        change_id: $.change.id
        approved_by: $.approval.user
        source: ci
    enabled: true
  - name: "Demo Webhook: GitOps drift detected"
    description: Synthetic GitOps drift event that starts the containerized render workflow.
    flows:
      - "Demo: containerized config render"
    auth_mode: bearer
    replay_window_seconds: 0
    rate_limit_per_minute: 20
    allowed_source_ips:
      - 203.0.113.0/24
    payload_mapping:
      run_name: $.repository.full_name
      params:
        repository: $.repository.full_name
        commit: $.after
        source: gitops
    enabled: true
  - name: "Demo Webhook: Monitoring alarm"
    description: Synthetic monitoring alarm that demonstrates event-driven readiness checks.
    flows:
      - "Demo: parallel site readiness"
    auth_mode: hmac_sha256
    replay_window_seconds: 300
    rate_limit_per_minute: 60
    allowed_source_ips:
      - 192.0.2.0/24
    payload_mapping:
      run_name: $.alarm.name
      params:
        alarm: $.alarm.name
        severity: $.alarm.severity
        source: monitoring
    enabled: true
  - name: "Demo Webhook: ITSM change window"
    description: Synthetic ITSM change-window event that starts the staged branch rollout flow.
    flows:
      - "Demo: staged branch rollout"
    auth_mode: hmac_sha256
    replay_window_seconds: 600
    rate_limit_per_minute: 15
    allowed_source_ips:
      - 192.0.2.0/24
    payload_mapping:
      run_name: $.number
      params:
        change_id: $.number
        window_start: $.window.start
        window_end: $.window.end
        source: itsm
    enabled: true
