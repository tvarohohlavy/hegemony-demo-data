schema_version: 2

secrets:
  - name: demo-db-app
    description: Synthetic app database credentials for demo secret-management workflows.
    folder: orgs/default/secrets/demo/database/app
    values:
      username: demo_app
      password: demo-app-password
      host: db.demo.local
      port: "5432"
      database: hegemony_demo
  - name: demo-db-readonly
    description: Synthetic read-only database credentials with multiple keys.
    folder: orgs/default/secrets/demo/database/readonly
    values:
      username: demo_readonly
      password: demo-readonly-password
      host: readonly-db.demo.local
      database: hegemony_reports
  - name: demo-network-snmp
    description: Synthetic SNMPv3 credential material for demo devices.
    folder: orgs/default/secrets/demo/network/snmp
    values:
      username: snmp_demo
      auth_password: demo-snmp-auth
      priv_password: demo-snmp-priv
      context: default
  - name: demo-network-radius
    description: Synthetic RADIUS shared-secret bundle.
    folder: orgs/default/secrets/demo/network/radius
    values:
      shared_secret: demo-radius-shared-secret
      primary_host: radius-a.demo.local
      secondary_host: radius-b.demo.local
  - name: demo-network-tacacs
    description: Synthetic TACACS+ shared secret for demo automation.
    folder: orgs/default/secrets/demo/network/tacacs
    values:
      shared_secret: demo-tacacs-shared-secret
      server: tacacs.demo.local
  - name: demo-git-token
    description: Synthetic Git token and username for repository workflow demos.
    folder: orgs/default/secrets/demo/integrations/git
    values:
      username: demo-git-user
      token: ghp_demo_synthetic_token
      repository: demo-network-configs
  - name: demo-webhook-hmac
    description: Synthetic webhook signing secret used for examples.
    folder: orgs/default/secrets/demo/integrations/webhook
    values:
      signing_secret: demo-webhook-hmac-secret
      header: X-Demo-Signature
  - name: demo-notification-shoutrrr
    description: Synthetic Shoutrrr service URLs for demo notification destinations.
    folder: orgs/default/secrets/demo/integrations/shoutrrr
    values:
      discord_url: discord://demo-token@demo-webhook-id
      slack_url: slack://demo-token@demo-channel
      teams_url: teams://demo-group@demo-tenant/demo-alt-id/demo-owner?host=demo-notifications.invalid
      telegram_url: telegram://demo-token@telegram?chats=demo-chat-id
      ntfy_url: ntfy://demo-notifications.invalid/hegemony-demo?scheme=https
  - name: demo-certificate-bundle
    description: Synthetic certificate material for multi-key secret demos.
    folder: orgs/default/secrets/demo/pki/certificate-bundle
    values:
      certificate_pem: DEMO_CERTIFICATE_PEM_PLACEHOLDER
      private_key_pem: DEMO_PRIVATE_KEY_PEM_PLACEHOLDER
      ca_bundle_pem: DEMO_CA_BUNDLE_PEM_PLACEHOLDER
  - name: demo-api-service-account
    description: Synthetic third-party service account credentials.
    folder: orgs/default/secrets/demo/integrations/service-account
    values:
      client_id: demo-client-id
      client_secret: demo-client-secret
      tenant: demo-tenant
      audience: demo-api
  - name: netbox-local-api-token
    description: API token for local NetBox instance used in demos.
    folder: orgs/default/secrets/netbox-local-api-token
    values:
      token: DEMO_NETBOX_API_TOKEN_PLACEHOLDER
