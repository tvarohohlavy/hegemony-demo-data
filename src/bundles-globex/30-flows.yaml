# Globex's own standards check. With no override, every value resolves to the
# shared golden standard — the contrast with Acme. Mounts the same report
# script (no inline command); device-less, runs with no form input.

schema_version: 2

flows:
  - name: "Globex: Plant standards check"
    description: >-
      Render Globex's effective network standards — all inherited unchanged
      from Meridian's shared golden baseline.
    definition:
      graph:
        nodes:
          - id: start
            name: Start
            type: start
            position_x: 0
            position_y: 120
          - id: render
            name: Render Globex standards
            type: step
            kind: EXECUTE
            phase: IMPLEMENTATION
            handler: container.run
            position_x: 320
            position_y: 120
            mounted_files:
              - report.sh
            params:
              image: alpine:3.20
              working_dir: /workspace
              timeout_seconds: 120
              command:
                - sh /attachments/report.sh
              env:
                REPORT_NAME: globex-standards
                TENANT_NAME: "{{ vars.TENANT_NAME }}"
                NTP_PRIMARY: "{{ vars.NTP_PRIMARY }}"
                DNS_PRIMARY: "{{ vars.DNS_PRIMARY }}"
                SYSLOG_PRIMARY: "{{ vars.SYSLOG_PRIMARY }}"
            policy:
              timeout_sec: 150
              retries: 0
              on_failure: FAIL_RUN
              evidence_required: true
          - id: done
            name: Standards rendered
            type: terminal
            terminal_status: success
            position_x: 640
            position_y: 120
        edges:
          - id: e_start_render
            source: start:start
            target: render
          - id: e_render_done
            source: render:success
            target: done
      interface_graph:
        # Preselected default targets: Globex's plant devices ship already
        # selected (by portable device name, resolved to ids on import). The
        # field is optional, so the flow still runs with no input.
        nodes:
          - id: sec_targets
            kind: section
            position_x: 80
            position_y: 80
            width: 480
            height: 180
            data:
              label: Plant devices
              runtime_layout: card
              collapsible: false
          - id: f_targets
            kind: field
            parent_id: sec_targets
            position_x: 40
            position_y: 60
            data:
              label: Plant devices
              field_id: targets
              field_type: inventory.device
              required: false
              description: Globex's plant-floor devices, preselected by default.
              default_value:
                - globex-plant1-core-01
                - globex-plant1-iot-gw-01
              config:
                role: plant_devices
                multiple: true
                option_source:
                  kind: inventory.devices
        edges: []

flow_attachments:
  - flow: "Globex: Plant standards check"
    filename: report.sh
    content_file: src/files/standards/report.sh
