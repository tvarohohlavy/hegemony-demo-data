# A shared, read-only monitoring token. It lives under orgs/shared/secrets/...,
# and the worker's secret confinement admits the shared namespace for every
# org — so the golden compliance flow can read it no matter which tenant runs
# the flow, without any tenant being able to enumerate or edit it. Synthetic.

schema_version: 2

secrets:
  - name: shared-monitoring-token
    description: Read-only monitoring API token every org's golden flow may use.
    folder: orgs/shared/secrets/standards/monitoring
    values:
      token: demo-shared-monitoring-readonly-token
