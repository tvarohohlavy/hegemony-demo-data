# Meridian's golden flows, published in the shared org so every tenant sees
# them (flagged "Shared") and can RUN them — and a run of a shared flow
# executes as the CONSUMER org. Each resolves the running org's effective
# standards: NTP shows a tenant's override where one exists, while DNS/syslog
# and the org name fall through to the shared golden values.
#
# All three are device-less (nothing to select) and carry NO inline script:
# the container step mounts a file attachment and passes every input as an
# environment variable the flow resolves from {{ vars.* }} / {{ secret(...) }}.
# They run with zero form input.

schema_version: 2

flows:
  # --- Standards report (shell via a mounted script) -------------------------
  - name: "Shared: Compliance baseline report"
    description: >-
      Render this organization's effective network standards into an artifact,
      proving which values resolve for the org that runs it. Runnable by every
      tenant with no inputs.
    definition:
      graph:
        nodes:
          - id: start
            name: Start
            type: start
            position_x: 0
            position_y: 120
          - id: render
            name: Render standards report
            type: step
            kind: EXECUTE
            phase: IMPLEMENTATION
            handler: container.run
            position_x: 320
            position_y: 120
            mounted_files:
              - report.sh
            params:
              image: alpine:3.22
              working_dir: /workspace
              timeout_seconds: 120
              command:
                - sh /attachments/report.sh
              env:
                REPORT_NAME: compliance-baseline
                TENANT_NAME: "{{ vars.TENANT_NAME }}"
                STANDARDS_OWNER: "{{ vars.STANDARDS_OWNER }}"
                NTP_PRIMARY: "{{ vars.NTP_PRIMARY }}"
                DNS_PRIMARY: "{{ vars.DNS_PRIMARY }}"
                SYSLOG_PRIMARY: "{{ vars.SYSLOG_PRIMARY }}"
                APPROVED_CONTAINER_IMAGES: "{{ vars.APPROVED_CONTAINER_IMAGES }}"
                # Proves the shared monitoring token resolves for whatever org
                # runs the flow, without printing it.
                MON_TOKEN: "{{ secret('vault://orgs/shared/secrets/standards/monitoring/token') }}"
            policy:
              timeout_sec: 150
              retries: 0
              on_failure: FAIL_RUN
              evidence_required: true
          - id: done
            name: Report generated
            type: terminal
            terminal_status: success
            position_x: 640
            position_y: 120
        edges:
          - id: e_start_render
            source: start:start
            target: render
          - id: e_render_done
            source: render:success
            target: done
      interface_graph:
        nodes: []
        edges: []

  # --- Ansible config audit (mounted playbook) -------------------------------
  - name: "Shared: Ansible config audit"
    description: >-
      Run an Ansible playbook (localhost, no devices needed) that asserts the
      organization's golden standards are all defined and writes a PASS/FAIL
      audit report. Demonstrates an Ansible activity; runnable by every tenant.
    definition:
      graph:
        nodes:
          - id: start
            name: Start
            type: start
            position_x: 0
            position_y: 120
          - id: audit
            name: ansible-playbook audit
            type: step
            kind: EXECUTE
            phase: VERIFY
            handler: container.run
            position_x: 320
            position_y: 120
            mounted_files:
              - audit.yml
              - run.sh
            params:
              image: alpine:3.22
              working_dir: /workspace
              timeout_seconds: 240
              command:
                - sh /attachments/run.sh
              env:
                TENANT_NAME: "{{ vars.TENANT_NAME }}"
                NTP_PRIMARY: "{{ vars.NTP_PRIMARY }}"
                DNS_PRIMARY: "{{ vars.DNS_PRIMARY }}"
                SYSLOG_PRIMARY: "{{ vars.SYSLOG_PRIMARY }}"
            policy:
              timeout_sec: 300
              retries: 0
              on_failure: FAIL_RUN
              evidence_required: true
          - id: done
            name: Audit passed
            type: terminal
            terminal_status: success
            position_x: 640
            position_y: 120
        edges:
          - id: e_start_audit
            source: start:start
            target: audit
          - id: e_audit_done
            source: audit:success
            target: done
      interface_graph:
        nodes: []
        edges: []

  # --- Terraform network-baseline plan (mounted config) ----------------------
  - name: "Shared: Terraform network baseline plan"
    description: >-
      Run a provider-less Terraform init + plan that renders the organization's
      effective network baseline as a plan output. Demonstrates a Terraform
      activity offline (no cloud credentials); runnable by every tenant.
    definition:
      graph:
        nodes:
          - id: start
            name: Start
            type: start
            position_x: 0
            position_y: 120
          - id: plan
            name: terraform init + plan
            type: step
            kind: EXECUTE
            phase: PREPARE
            handler: container.run
            position_x: 320
            position_y: 120
            mounted_files:
              - main.tf
              - run.sh
            params:
              image: hashicorp/terraform:1.9
              # hashicorp/terraform's entrypoint is `terraform`; override it so
              # Command runs as a shell script.
              entrypoint: /bin/sh
              working_dir: /workspace
              timeout_seconds: 240
              command:
                - sh /attachments/run.sh
              env:
                TF_VAR_tenant: "{{ vars.TENANT_NAME }}"
                TF_VAR_ntp_primary: "{{ vars.NTP_PRIMARY }}"
                TF_VAR_dns_primary: "{{ vars.DNS_PRIMARY }}"
                TF_VAR_syslog_primary: "{{ vars.SYSLOG_PRIMARY }}"
            policy:
              timeout_sec: 300
              retries: 0
              on_failure: FAIL_RUN
              evidence_required: true
          - id: done
            name: Plan generated
            type: terminal
            terminal_status: success
            position_x: 640
            position_y: 120
        edges:
          - id: e_start_plan
            source: start:start
            target: plan
          - id: e_plan_done
            source: plan:success
            target: done
      interface_graph:
        nodes: []
        edges: []

flow_attachments:
  - flow: "Shared: Compliance baseline report"
    filename: report.sh
    content_file: src/files/standards/report.sh
  - flow: "Shared: Ansible config audit"
    filename: audit.yml
    content_file: src/files/ansible/audit.yml
  - flow: "Shared: Ansible config audit"
    filename: run.sh
    content_file: src/files/ansible/run.sh
  - flow: "Shared: Terraform network baseline plan"
    filename: main.tf
    content_file: src/files/terraform/main.tf
  - flow: "Shared: Terraform network baseline plan"
    filename: run.sh
    content_file: src/files/terraform/run.sh
