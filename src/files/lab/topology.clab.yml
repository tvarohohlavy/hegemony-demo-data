#
# Four FRR routers in a full mesh (6 point-to-point links), each with a static
# management address on a fixed subnet so the seeded Git inventory can target
# them by mgmt_host. The __HEGEMONY_CLAB_*__ placeholders are substituted by
# the Bootstrap flow at deploy time (see the flow's deploy step) so the bind
# sources resolve identically inside the orchestrator container and on the host
# Docker daemon that actually creates the router containers.
name: __HEGEMONY_CLAB_NAME__

mgmt:
  network: meridian-lab-mgmt
  ipv4-subnet: 172.20.30.0/24

topology:
  kinds:
    linux:
      image: meridian/frr-lab:latest
      # Shared FRR daemons file (zebra + ospfd); per-router frr.conf is bound
      # per node below.
      binds:
        - __HEGEMONY_CLAB_WORKDIR__/frr/daemons:/etc/frr/daemons
        - __HEGEMONY_CLAB_WORKDIR__/frr/vtysh.conf:/etc/frr/vtysh.conf
  nodes:
    r1:
      kind: linux
      mgmt-ipv4: 172.20.30.11
      binds:
        - __HEGEMONY_CLAB_WORKDIR__/frr/r1.conf:/etc/frr/frr.conf
    r2:
      kind: linux
      mgmt-ipv4: 172.20.30.12
      binds:
        - __HEGEMONY_CLAB_WORKDIR__/frr/r2.conf:/etc/frr/frr.conf
    r3:
      kind: linux
      mgmt-ipv4: 172.20.30.13
      binds:
        - __HEGEMONY_CLAB_WORKDIR__/frr/r3.conf:/etc/frr/frr.conf
    r4:
      kind: linux
      mgmt-ipv4: 172.20.30.14
      binds:
        - __HEGEMONY_CLAB_WORKDIR__/frr/r4.conf:/etc/frr/frr.conf
  links:
    - endpoints: ["r1:eth1", "r2:eth1"]   # 10.0.12.0/30
    - endpoints: ["r1:eth2", "r3:eth1"]   # 10.0.13.0/30
    - endpoints: ["r1:eth3", "r4:eth1"]   # 10.0.14.0/30
    - endpoints: ["r2:eth2", "r3:eth2"]   # 10.0.23.0/30
    - endpoints: ["r2:eth3", "r4:eth2"]   # 10.0.24.0/30
    - endpoints: ["r3:eth3", "r4:eth3"]   # 10.0.34.0/30
