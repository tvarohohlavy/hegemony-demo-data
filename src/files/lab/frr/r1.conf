frr version 9.1
frr defaults traditional
hostname lab-r1
service integrated-vtysh-config
!
interface lo
 ip address 10.255.255.1/32
!
interface eth1
 description to-lab-r2
 ip address 10.0.12.1/30
!
interface eth2
 description to-lab-r3
 ip address 10.0.13.1/30
!
interface eth3
 description to-lab-r4
 ip address 10.0.14.1/30
!
router ospf
 ospf router-id 10.255.255.1
 network 10.0.12.0/30 area 0
 network 10.0.13.0/30 area 0
 network 10.0.14.0/30 area 0
 network 10.255.255.1/32 area 0
!
