frr version 9.1
frr defaults traditional
hostname lab-r3
service integrated-vtysh-config
!
interface lo
 ip address 10.255.255.3/32
!
interface eth1
 description to-lab-r1
 ip address 10.0.13.2/30
!
interface eth2
 description to-lab-r2
 ip address 10.0.23.2/30
!
interface eth3
 description to-lab-r4
 ip address 10.0.34.1/30
!
router ospf
 ospf router-id 10.255.255.3
 network 10.0.13.0/30 area 0
 network 10.0.23.0/30 area 0
 network 10.0.34.0/30 area 0
 network 10.255.255.3/32 area 0
!
