frr version 9.1
frr defaults traditional
hostname br2-acc-01
service integrated-vtysh-config
!
interface lo
 ip address 10.255.255.8/32
!
interface eth1
 description to-br2-edge-01
 ip address 10.3.1.2/30
!
interface eth2
 description lan-br2-srv-01
 ip address 10.103.1.1/24
!
router ospf
 ospf router-id 10.255.255.8
 network 10.255.255.8/32 area 3
 network 10.3.1.0/30 area 3
 network 10.103.1.0/24 area 3
!
