#
# Golden config-audit playbook. It runs against localhost (no network devices
# needed), reads the organization's effective standards from the environment
# the flow resolves from {{ vars.* }}, asserts they are all defined, and writes
# a PASS/FAIL audit report into the run artifacts. Mounted into the container
# at /attachments and executed by run.sh.
- name: Meridian golden config audit
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    tenant: "{{ lookup('env', 'TENANT_NAME') | default('unknown', true) }}"
    ntp: "{{ lookup('env', 'NTP_PRIMARY') }}"
    dns: "{{ lookup('env', 'DNS_PRIMARY') }}"
    syslog: "{{ lookup('env', 'SYSLOG_PRIMARY') }}"
  tasks:
    - name: Ensure the artifact directory exists
      ansible.builtin.file:
        path: /artifacts/new
        state: directory
        mode: "0755"

    - name: Evaluate the golden standards
      ansible.builtin.set_fact:
        standards_ok: "{{ (ntp | length > 0) and (dns | length > 0) and (syslog | length > 0) }}"

    # Always write the report first — including the FAIL path — so the run has an
    # audit artifact recording the tenant, standards and result even when a
    # standard is unset and the assertion below aborts the play.
    - name: Render the audit report
      ansible.builtin.copy:
        dest: /artifacts/new/ansible-audit.txt
        mode: "0644"
        content: |
          Ansible golden config audit — {{ tenant }}
          NTP primary    : {{ ntp | default('<unset>', true) }}
          DNS primary    : {{ dns | default('<unset>', true) }}
          Syslog primary : {{ syslog | default('<unset>', true) }}
          Result         : {{ 'PASS (all standards present)' if standards_ok | bool else 'FAIL (one or more standards unset)' }}

    - name: Assert the golden standards are all defined
      ansible.builtin.assert:
        that:
          - standards_ok | bool
        success_msg: "All golden standards are present for {{ tenant }}."
        fail_msg: "One or more golden standards is unset for {{ tenant }}."
