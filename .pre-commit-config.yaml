default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
        name: "Checks: merge conflict markers"
      - id: check-yaml
        name: "Checks: YAML syntax"
      - id: check-toml
        name: "Checks: TOML syntax"
      - id: end-of-file-fixer
        name: "Checks: EOF newline"
      - id: trailing-whitespace
        name: "Checks: trailing whitespace"
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject
        name: "Python: pyproject validation"

  - repo: https://github.com/crate-ci/typos
    rev: v1.42.1
    hooks:
      - id: typos
        name: "Checks: typo scan"

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
        name: "Security: GitHub Actions policy scan (Zizmor)"
        args: ["--config", ".github/zizmor.yml"]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.36.0
    hooks:
      - id: check-github-workflows
        name: "CI: GitHub workflow schema validation"

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
        name: "Licensing: REUSE 3.3 SPDX compliance"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "Security: secrets scan (gitleaks)"

  - repo: local
    hooks:
      - id: build-demo-single-yaml
        name: "Data: build generated Hegemony demo YAML"
        entry: env PYTHONDONTWRITEBYTECODE=1 uv run python scripts/build.py
        language: system
        pass_filenames: false
        files: ^(manifest\.ya?ml|src/bundles/.*\.ya?ml|scripts/build\.py)$
      - id: validate-demo-data
        name: "Data: validate Hegemony demo references"
        entry: env PYTHONDONTWRITEBYTECODE=1 uv run python scripts/validate.py
        language: system
        pass_filenames: false
        files: ^(manifest\.ya?ml|src/bundles/.*\.ya?ml|scripts/(build|validate)\.py)$

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        name: "Checks: commit message (commitlint)"
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/config-conventional@19"
