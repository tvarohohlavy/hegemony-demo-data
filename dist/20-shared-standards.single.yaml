# Generated by scripts/build.py; edit src/bundles-shared/*.yaml instead.
schema_version: 2
organization: shared
secrets:
- name: shared-monitoring-token
  description: Read-only monitoring API token every org's golden flow may use.
  folder: orgs/shared/secrets/standards/monitoring
  values:
    token: demo-shared-monitoring-readonly-token
flows:
- name: 'Shared: Compliance baseline report'
  description: Render this organization's effective network standards (NTP/DNS/syslog, approved images) into an artifact,
    proving which values resolve for the org that runs it. Published by Meridian in the shared org; runnable by every tenant.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: render
        name: Render standards report
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 320
        position_y: 120
        params:
          image: alpine:3.20
          working_dir: /workspace
          timeout_seconds: 120
          env:
            MON_TOKEN: '{{ secret(''vault://orgs/shared/secrets/standards/monitoring/token'') }}'
          command:
          - "set -e\nmkdir -p /artifacts/new\nREPORT=/artifacts/new/compliance-baseline.txt\n{\n  printf 'Compliance baseline\
            \ — curated by %s\\n' \"{{ vars.STANDARDS_OWNER }}\"\n  printf 'Effective standards for the running organization:\\\
            n'\n  printf '  NTP primary    : %s\\n' \"{{ vars.NTP_PRIMARY }}\"\n  printf '  DNS primary    : %s\\n' \"{{ vars.DNS_PRIMARY\
            \ }}\"\n  printf '  Syslog primary : %s\\n' \"{{ vars.SYSLOG_PRIMARY }}\"\n  printf '  Approved images: %s\\n'\
            \ \"{{ vars.APPROVED_CONTAINER_IMAGES }}\"\n  if [ -n \"${MON_TOKEN}\" ]; then\n    printf '  Monitoring token:\
            \ present (shared, masked)\\n'\n  else\n    printf '  Monitoring token: MISSING\\n'\n  fi\n} | tee \"${REPORT}\"\
            \n"
        policy:
          timeout_sec: 150
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: done
        name: Report generated
        type: terminal
        terminal_status: success
        position_x: 640
        position_y: 120
      edges:
      - id: e_start_render
        source: start:start
        target: render
      - id: e_render_done
        source: render:success
        target: done
    interface_graph:
      nodes: []
      edges: []
variables:
- name: NTP_PRIMARY
  value: 192.0.2.123
  description: Golden primary NTP server. Shared standard; a tenant may override it.
- name: DNS_PRIMARY
  value: 192.0.2.53
  description: Golden primary DNS resolver. Shared standard read by every org.
- name: SYSLOG_PRIMARY
  value: 192.0.2.54
  description: Golden primary syslog collector. Shared standard read by every org.
- name: APPROVED_CONTAINER_IMAGES
  value: alpine:3.20, alpine/git:v2.45.2, ghcr.io/srl-labs/clab:0.77.0
  description: Container images Meridian has vetted for flow steps; surfaced to every org.
- name: STANDARDS_OWNER
  value: Meridian Shared Standards
  description: Curator of the golden baseline, stamped into shared-flow output.
file_repositories:
- name: Golden Artifacts
  kind: s3
  endpoint_url: http://minio:9000
  bucket: meridian-golden
  prefix: standards/
  is_default: false
notification_destinations:
- name: 'Shared: Platform NOC Email'
  type: email
  enabled: true
  config_json:
    to:
    - platform-noc@meridian.example
    from: standards@meridian.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
flow_subscriptions:
- flow: 'Shared: Compliance baseline report'
  destination: 'Shared: Platform NOC Email'
  event: run.failed
  enabled: true
