flows:
- name: 'Lab: Provision and tear down demo datacenter'
  description: Build the lab images, deploy the multi-area OSPF lab (11 routers and 4 Linux endpoint hosts across dc1, dc2
    and two branches), attach the lab network to the workers, and optionally stand up Gitea; then hold at an approval gate
    (no expiry) so you can interact with the lab. Approve to tear it down, reject to leave it running.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 200
      - id: build_image
        name: Build lab images
        type: step
        kind: EXECUTE
        phase: PREPARE
        handler: container.run
        position_x: 320
        position_y: 200
        mounted_files:
        - Dockerfile
        - entrypoint.sh
        - host/
        params:
          image: ghcr.io/srl-labs/clab:0.77.0
          working_dir: /tmp/meridian-lab
          attach_docker_socket: true
          network_mode: host
          timeout_seconds: 600
          env:
            LAB_PASSWORD: '{{ secret(''vault://orgs/default/secrets/meridian/lab/ssh/password'') }}'
          command:
          - "set -e\nWORKDIR=/tmp/meridian-lab\nmkdir -p \"${WORKDIR}\"\ncp -ar /attachments/* \"${WORKDIR}/\"\necho \"Building\
            \ meridian/frr-lab:latest ...\"\ndocker build --build-arg LAB_PASSWORD=\"${LAB_PASSWORD}\" \\\n  -t meridian/frr-lab:latest\
            \ \"${WORKDIR}\"\necho \"Building meridian/lab-host:latest ...\"\ndocker build --build-arg LAB_PASSWORD=\"${LAB_PASSWORD}\"\
            \ \\\n  -t meridian/lab-host:latest \"${WORKDIR}/host\"\n"
        policy:
          timeout_sec: 660
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: fork
        name: Deploy lab and Gitea
        type: fork
        position_x: 620
        position_y: 200
      - id: deploy_lab
        name: Deploy containerlab multi-area lab
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 920
        position_y: 40
        mounted_files:
        - topology.clab.yml
        - frr/
        params:
          image: ghcr.io/srl-labs/clab:0.77.0
          working_dir: /tmp/meridian-lab
          attach_docker_socket: true
          network_mode: host
          privileged: true
          pid_mode: host
          extra_mounts:
          - /var/run/netns:/var/run/netns:shared
          - /var/lib/docker:/var/lib/docker
          - /tmp/meridian-lab:/tmp/meridian-lab
          timeout_seconds: 600
          command:
          - "set -e\nLAB_NAME=meridian-lab\nWORKDIR=/tmp/meridian-lab\nTOPOLOGY=\"${WORKDIR}/topology.run.clab.yml\"\nmkdir\
            \ -p \"${WORKDIR}\"\ncp -ar /attachments/* \"${WORKDIR}/\"\nsed \\\n  -e \"s#__HEGEMONY_CLAB_NAME__#${LAB_NAME}#g\"\
            \ \\\n  -e \"s#__HEGEMONY_CLAB_WORKDIR__#${WORKDIR}#g\" \\\n  \"${WORKDIR}/topology.clab.yml\" > \"${TOPOLOGY}\"\
            \n# --reconfigure makes re-runs idempotent: a lab left running\n# (teardown gate rejected) is redeployed instead\
            \ of erroring.\ncontainerlab deploy --reconfigure -t \"${TOPOLOGY}\"\n"
        policy:
          timeout_sec: 660
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: connect_workers
        name: Attach lab network to workers
        type: step
        kind: ACTION
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 1220
        position_y: 40
        params:
          image: ghcr.io/srl-labs/clab:0.77.0
          working_dir: /workspace
          attach_docker_socket: true
          network_mode: host
          timeout_seconds: 120
          command:
          - "set -e\n# Give the Hegemony workers an interface on the lab management\n# network so netcli can SSH to the routers.\
            \ The compose service\n# label targets exactly the Hegemony workers (a name substring\n# would also catch unrelated\
            \ containers such as NetBox workers);\n# -q filters avoid docker --format templates colliding with\n# Jinja braces.\n\
            COUNT=0\nfor c in $(docker ps -q --filter label=com.docker.compose.service=worker); do\n  docker network connect\
            \ meridian-lab-mgmt \"$c\" 2>/dev/null || true\n  COUNT=$((COUNT + 1))\ndone\necho \"Attached ${COUNT} worker\
            \ container(s) to meridian-lab-mgmt ({{ vars.LAB_MGMT_SUBNET }})\"\n"
      - id: wait_ready
        name: Wait for FRR to answer on all routers
        type: step
        kind: CHECK
        phase: VERIFY
        handler: container.run
        position_x: 1520
        position_y: 40
        params:
          image: ghcr.io/srl-labs/clab:0.77.0
          working_dir: /workspace
          attach_docker_socket: true
          network_mode: host
          timeout_seconds: 180
          command:
          - "set -e\nfor r in dc1-core-01 dc1-core-02 dc1-acc-01 dc1-acc-02 \\\n         dc2-core-01 dc2-core-02 dc2-acc-01\
            \ \\\n         br1-edge-01 br1-acc-01 br2-edge-01 br2-acc-01; do\n  C=\"clab-meridian-lab-$r\"\n  echo \"--- waiting\
            \ for ${C} (vtysh) ---\"\n  for i in $(seq 1 30); do\n    if docker exec \"$C\" vtysh -c 'show version' >/dev/null\
            \ 2>&1; then\n      echo \"ready: $r (attempt $i)\"\n      break\n    fi\n    sleep 2\n    if [ \"$i\" = \"30\"\
            \ ]; then\n      echo \"TIMEOUT waiting for $r\" >&2\n      exit 1\n    fi\n  done\ndone\nfor h in dc1-srv-01\
            \ dc2-srv-01 br1-srv-01 br2-srv-01; do\n  C=\"clab-meridian-lab-$h\"\n  echo \"--- waiting for ${C} (sshd) ---\"\
            \n  for i in $(seq 1 15); do\n    if docker exec \"$C\" pgrep sshd >/dev/null 2>&1; then\n      echo \"ready:\
            \ $h (attempt $i)\"\n      break\n    fi\n    sleep 2\n    if [ \"$i\" = \"15\" ]; then\n      echo \"TIMEOUT\
            \ waiting for $h\" >&2\n      exit 1\n    fi\n  done\ndone\necho \"All 11 routers answer vtysh and all 4 endpoint\
            \ hosts run sshd.\"\n"
        policy:
          timeout_sec: 240
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: deploy_gitea
        name: Deploy Gitea backup server
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 920
        position_y: 360
        mounted_files:
        - seed.sh
        params:
          image: ghcr.io/srl-labs/clab:0.77.0
          working_dir: /workspace
          attach_docker_socket: true
          network_mode: host
          timeout_seconds: 300
          env:
            GITEA_CONTAINER: meridian-gitea
            GITEA_URL: '{{ vars.GITEA_URL }}'
            GITEA_ORG: '{{ vars.GITEA_ORG }}'
            ADMIN_USER: '{{ secret(''vault://orgs/default/secrets/meridian/gitea/admin/username'') }}'
            ADMIN_PASSWORD: '{{ secret(''vault://orgs/default/secrets/meridian/gitea/admin/password'') }}'
          command:
          - "DEPLOY=$(printf '%s' \"{{ inputs.deploy_gitea }}\" | tr 'A-Z' 'a-z')\ncase \"$DEPLOY\" in\n  true|1|yes) ;;\n\
            \  *)\n    echo \"Gitea deployment skipped (deploy_gitea unchecked).\"\n    exit 0\n    ;;\nesac\nset -e\ndocker\
            \ rm -f meridian-gitea 2>/dev/null || true\ndocker run -d --name meridian-gitea \\\n  -p 3000:3000 \\\n  -e GITEA__security__INSTALL_LOCK=true\
            \ \\\n  -e GITEA__server__ROOT_URL=\"http://localhost:3000/\" \\\n  gitea/gitea:1.22-rootless\nsh /attachments/seed.sh\n"
      - id: join
        name: Datacenter ready
        type: join
        join_mode: all
        failure_policy: propagate
        cancel_policy: wait
        position_x: 1820
        position_y: 200
      - id: hold
        name: Interact, then approve to tear down
        type: approval
        phase: IMPLEMENTATION
        position_x: 2120
        position_y: 200
        params:
          title: Demo datacenter is up — approve to tear it down
          message: 'The lab is running: 11 routers and 4 Linux endpoint hosts in 172.20.30.0/24 (dc1 .11-.15, br1 .21-.23,
            br2 .31-.33, dc2 .41-.44; user clab). Exercise the Ops/Net flows against them — including the end-to-end reachability
            test from the endpoint hosts — and browse Gitea at http://localhost:3000 if deployed. This gate never expires.
            APPROVE to tear the lab down and clean the host; REJECT to leave it running.'
      - id: teardown
        name: Destroy lab and Gitea
        type: step
        kind: EXECUTE
        phase: CLEANUP
        handler: container.run
        position_x: 2420
        position_y: 120
        mounted_files:
        - topology.clab.yml
        - frr/
        params:
          image: ghcr.io/srl-labs/clab:0.77.0
          working_dir: /tmp/meridian-lab
          attach_docker_socket: true
          network_mode: host
          privileged: true
          pid_mode: host
          extra_mounts:
          - /var/run/netns:/var/run/netns:shared
          - /var/lib/docker:/var/lib/docker
          - /tmp/meridian-lab:/tmp/meridian-lab
          timeout_seconds: 300
          command:
          - "set -e\nLAB_NAME=meridian-lab\nWORKDIR=/tmp/meridian-lab\nTOPOLOGY=\"${WORKDIR}/topology.run.clab.yml\"\nmkdir\
            \ -p \"${WORKDIR}\"\nif [ ! -f \"${TOPOLOGY}\" ]; then\n  cp -ar /attachments/* \"${WORKDIR}/\" 2>/dev/null ||\
            \ true\n  sed \\\n    -e \"s#__HEGEMONY_CLAB_NAME__#${LAB_NAME}#g\" \\\n    -e \"s#__HEGEMONY_CLAB_WORKDIR__#${WORKDIR}#g\"\
            \ \\\n    \"${WORKDIR}/topology.clab.yml\" > \"${TOPOLOGY}\"\nfi\ncontainerlab destroy -t \"${TOPOLOGY}\" --cleanup\
            \ || true\n# The workers attached during bootstrap still hold endpoints on\n# the management network; detach them\
            \ or the network removal is\n# refused and the network (and worker interfaces) linger.\nfor c in $(docker ps -aq\
            \ --filter network=meridian-lab-mgmt); do\n  docker network disconnect -f meridian-lab-mgmt \"$c\" 2>/dev/null\
            \ || true\ndone\ndocker network rm meridian-lab-mgmt 2>/dev/null || true\nrm -rf \"${WORKDIR}\" || true\nREMOVE_GITEA=$(printf\
            \ '%s' \"{{ inputs.remove_gitea }}\" | tr 'A-Z' 'a-z')\ncase \"$REMOVE_GITEA\" in\n  true|1|yes)\n    docker rm\
            \ -f meridian-gitea 2>/dev/null || true\n    echo \"Removed Gitea container.\"\n    ;;\nesac\necho \"Teardown\
            \ complete.\"\n"
        policy:
          timeout_sec: 330
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: done
        name: Lab torn down
        type: terminal
        terminal_status: success
        position_x: 2720
        position_y: 40
      - id: left_running
        name: Lab left running
        type: terminal
        terminal_status: success
        position_x: 2720
        position_y: 260
      - id: failed
        name: Lifecycle failed
        type: terminal
        terminal_status: failure
        position_x: 2420
        position_y: 400
      edges:
      - id: e_start_build
        source: start:start
        target: build_image
      - id: e_build_fork
        source: build_image:success
        target: fork
      - id: e_build_failed
        source: build_image:failure
        target: failed
      - id: e_fork_lab
        source: fork:fork
        target: deploy_lab
      - id: e_fork_gitea
        source: fork:fork
        target: deploy_gitea
      - id: e_lab_connect
        source: deploy_lab:success
        target: connect_workers
      - id: e_lab_join_fail
        source: deploy_lab:failure
        target: join
      - id: e_connect_wait
        source: connect_workers:success
        target: wait_ready
      - id: e_connect_join_fail
        source: connect_workers:failure
        target: join
      - id: e_wait_join
        source: wait_ready:success
        target: join
      - id: e_wait_join_fail
        source: wait_ready:failure
        target: join
      - id: e_gitea_join
        source: deploy_gitea:success
        target: join
      - id: e_gitea_join_fail
        source: deploy_gitea:failure
        target: join
      - id: e_join_hold
        source: join:joined
        target: hold
      - id: e_join_failed
        source: join:join_failed
        target: failed
      - id: e_hold_teardown
        source: hold:approved
        target: teardown
      - id: e_hold_left
        source: hold:rejected
        target: left_running
      - id: e_teardown_done
        source: teardown:success
        target: done
      - id: e_teardown_failed
        source: teardown:failure
        target: failed
    interface_graph:
      nodes:
      - id: sec_options
        kind: section
        position_x: 80
        position_y: 80
        width: 520
        height: 260
        data:
          label: Datacenter options
          description: What to stand up now, and what to remove at teardown.
          runtime_layout: card
          collapsible: false
      - id: f_deploy_gitea
        kind: field
        parent_id: sec_options
        position_x: 40
        position_y: 60
        data:
          label: Deploy Gitea backup server
          field_id: deploy_gitea
          field_type: core.bool
          required: false
          default_value: true
          description: Also stand up a local Gitea for the config-backup workflow.
          config: {}
      - id: f_remove_gitea
        kind: field
        parent_id: sec_options
