schema_version: 2
organization: default
secrets:
- name: meridian-gitea-admin
  description: Admin account for the demo Gitea service.
  folder: orgs/default/secrets/meridian/gitea/admin
  values:
    username: meridian-admin
    password: demo-gitea-admin-password
- name: meridian-gitea-token
  description: Write token for Hegemony's native git backups (flow + platform sync).
  folder: orgs/default/secrets/meridian/gitea/token
  values:
    token: DEMO_GITEA_WRITE_TOKEN_PLACEHOLDER
- name: meridian-lab-ssh
  description: SSH login for the containerlab FRR routers.
  folder: orgs/default/secrets/meridian/lab/ssh
  values:
    username: clab
    password: demo-lab-password
- name: meridian-prod-ssh
  description: SSH + enable credentials for the production device estate.
  folder: orgs/default/secrets/meridian/prod/ssh
  values:
    username: netops
    password: demo-prod-password
    enable_password: demo-prod-enable
- name: meridian-webhook-hmac
  description: Shared HMAC signing secret for demo webhooks.
  folder: orgs/default/secrets/meridian/integrations/webhook
  values:
    signing_secret: demo-webhook-hmac-secret
    header: X-Meridian-Signature
- name: meridian-notify
  description: Tokens and URLs for demo notification destinations.
  folder: orgs/default/secrets/meridian/integrations/notify
  values:
    discord_token: demo-discord-webhook-token
    slack_token: demo-token-a/demo-token-b/demo-token-c
    telegram_token: demo-telegram-bot-token
    teams_url: https://meridian-notify.invalid/teams/workflow?sig=demo
    webex_token: demo-webex-incoming-token
    ntfy_url: ntfy://meridian-notify.invalid/meridian-demo?scheme=https
- name: meridian-netbox-token
  description: API token for the disabled NetBox inventory-provider example.
  folder: orgs/default/secrets/meridian/integrations/netbox
  values:
    token: DEMO_NETBOX_API_TOKEN_PLACEHOLDER
