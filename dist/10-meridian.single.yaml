- flow: 'Lab: Provision and tear down demo datacenter'
  filename: seed.sh
  content: "#!/bin/sh\n# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>\n# SPDX-License-Identifier:\
    \ AGPL-3.0-or-later\n#\n# Provision the demo Gitea so the backup integrations have somewhere to push:\n# wait for health,\
    \ create the admin account and a public org, then create the\n# auto-initialised backup repositories:\n#   * config-backups\
    \   — pushed to by the \"Ops: Backup lab configs to Git\" flow\n#                        from inside its own container\
    \ (HTTP basic auth).\n#   * flow-backups     — Hegemony's native flow Git-sync writes flow definitions\n#            \
    \            here (see the flow's Git section in the demo bundle).\n#   * platform-backups — a Platform Sync BACKUP profile\
    \ exports platform config\n#                        here (created in the UI; see docs/walkthrough.md).\n# The two native-write\
    \ repos need a token: Hegemony authenticates git over HTTP\n# with an access token sent as the Basic-auth password (any\
    \ username), which\n# this script mints and prints for you to paste into the meridian-gitea-token\n# secret. Idempotent\
    \ — safe to re-run.\nset -e\n\nGITEA_CONTAINER=\"${GITEA_CONTAINER:-meridian-gitea}\"\nBASE=\"${GITEA_URL:-http://host.docker.internal:3000}\"\
    \nADMIN_USER=\"${ADMIN_USER:-meridian-admin}\"\nADMIN_PASSWORD=\"${ADMIN_PASSWORD:-demo-gitea-admin-password}\"\nORG=\"\
    ${GITEA_ORG:-meridian}\"\n\necho \"Waiting for Gitea at ${BASE} ...\"\nHEALTHY=false\nfor _ in $(seq 1 60); do\n  if curl\
    \ -fsS \"${BASE}/api/healthz\" >/dev/null 2>&1; then\n    echo \"Gitea is healthy.\"\n    HEALTHY=true\n    break\n  fi\n\
    \  sleep 2\ndone\nif [ \"${HEALTHY}\" != \"true\" ]; then\n  echo \"ERROR: Gitea did not become healthy within 120s\"\
    \ >&2\n  exit 1\nfi\n\necho \"Creating admin user ${ADMIN_USER} (idempotent) ...\"\ndocker exec \"${GITEA_CONTAINER}\"\
    \ gitea admin user create \\\n  --username \"${ADMIN_USER}\" \\\n  --password \"${ADMIN_PASSWORD}\" \\\n  --email \"${ADMIN_USER}@meridian.example\"\
    \ \\\n  --admin --must-change-password=false \\\n  || echo \"admin user already exists; continuing\"\n\necho \"Creating\
    \ public org ${ORG} (idempotent) ...\"\ncurl -fsS -u \"${ADMIN_USER}:${ADMIN_PASSWORD}\" -X POST \"${BASE}/api/v1/orgs\"\
    \ \\\n  -H 'Content-Type: application/json' \\\n  -d \"{\\\"username\\\":\\\"${ORG}\\\",\\\"visibility\\\":\\\"public\\\
    \"}\" \\\n  || echo \"org already exists; continuing\"\n\nfor REPO in config-backups flow-backups platform-backups; do\n\
    \  echo \"Creating ${REPO} repository (idempotent) ...\"\n  curl -fsS -u \"${ADMIN_USER}:${ADMIN_PASSWORD}\" -X POST \"\
    ${BASE}/api/v1/orgs/${ORG}/repos\" \\\n    -H 'Content-Type: application/json' \\\n    -d \"{\\\"name\\\":\\\"${REPO}\\\
    \",\\\"private\\\":false,\\\"auto_init\\\":true,\\\"default_branch\\\":\\\"main\\\"}\" \\\n    || echo \"repository ${REPO}\
    \ already exists; continuing\"\ndone\n\n# Mint a write-scoped access token for Hegemony's native git integrations\n# (flow\
    \ Git-sync and Platform Sync). Gitea validates a token supplied as the\n# Basic-auth password regardless of the username,\
    \ which is exactly how\n# Hegemony's auth_secret_ref sends it (Authorization: Basic base64(x-access-token:TOKEN)).\n#\
    \ Token names are unique per user, so a re-run reports the existing one instead\n# of failing the whole seed.\necho \"\
    Minting the 'hegemony-backups' access token (idempotent) ...\"\nTOKEN_JSON=$(curl -fsS -u \"${ADMIN_USER}:${ADMIN_PASSWORD}\"\
    \ -X POST \\\n  \"${BASE}/api/v1/users/${ADMIN_USER}/tokens\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"\
    name\":\"hegemony-backups\",\"scopes\":[\"write:repository\"]}' 2>/dev/null || true)\nTOKEN=$(printf '%s' \"${TOKEN_JSON}\"\
    \ | sed -n 's/.*\"sha1\":\"\\([^\"]*\\)\".*/\\1/p')\nif [ -n \"${TOKEN}\" ]; then\n  echo \"  ------------------------------------------------------------------\"\
    \n  echo \"  Store this token in the Hegemony secret 'meridian-gitea-token'\"\n  echo \"  (folder orgs/default/secrets/meridian/gitea/token,\
    \ key 'token') so\"\n  echo \"  the flow-backups and platform-backups repositories can be written to:\"\n  echo \"   \
    \ ${TOKEN}\"\n  echo \"  ------------------------------------------------------------------\"\nelse\n  echo \"  Token\
    \ 'hegemony-backups' already exists; reuse the value already stored\"\n  echo \"  in the meridian-gitea-token secret,\
    \ or delete the token in Gitea and\"\n  echo \"  re-run this flow to mint a fresh one.\"\nfi\n\necho \"Gitea seeded: ${BASE}/${ORG}/{config-backups,flow-backups,platform-backups}\"\
    \n"
variables:
- name: ORG_NAME
  value: Meridian Networks
  description: Fictional operator name surfaced in flow output and notifications.
- name: NOC_CONTACT
  value: noc@meridian.example
  description: Network Operations Center contact address for change records.
- name: MAINT_WINDOW
  value: Sun 02:00-04:00 UTC
  description: Standard maintenance window, recorded in backup manifests.
- name: GITEA_HOST
  value: localhost
  description: Host that publishes the demo Gitea service. The flows that reach Gitea run as host-networked containers, so
    localhost:3000 addresses it directly.
- name: GITEA_PORT
  value: '3000'
  description: Published port of the demo Gitea service.
- name: GITEA_ORG
  value: meridian
  description: Gitea organisation that owns the source-of-truth and backup repos.
- name: GITEA_URL
  value: http://{{ vars.GITEA_HOST }}:{{ vars.GITEA_PORT }}
  description: Base URL of the demo Gitea service (composed from GITEA_HOST/PORT).
- name: LAB_MGMT_SUBNET
  value: 172.20.30.0/24
  description: Management subnet containerlab assigns to the FRR lab routers.
notification_destinations:
- name: Meridian NOC Email
  type: email
  enabled: true
  config_json:
    to:
    - noc@meridian.example
    from: hegemony@meridian.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
- name: Meridian Security Email
  type: email
  enabled: true
  config_json:
    to:
    - security@meridian.example
    from: hegemony@meridian.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
- name: Meridian Discord
  type: discord
  enabled: true
  config_json:
    token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/discord_token'') }}'
    webhook_id: '123456789012345678'
- name: Meridian Slack
  type: slack
  enabled: true
  config_json:
    token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/slack_token'') }}'
    botname: Meridian
- name: Meridian Telegram
  type: telegram
  enabled: true
  config_json:
    token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/telegram_token'') }}'
    chats: '123456789'
- name: Meridian Teams
  type: teams_power_automate
  enabled: true
  config_json:
    url: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/teams_url'') }}'
- name: Meridian Webex
  type: webex_incoming_webhook
  enabled: true
  config_json:
    webhook_token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/webex_token'') }}'
- name: Meridian Ntfy
  type: shoutrrr
  enabled: true
  config_json:
    url_secret: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/ntfy_url'') }}'
    title: Meridian Networks Demo
- name: 'Meridian Webhook: Signed HMAC'
  type: outgoing_webhook
  enabled: true
  config_json:
    url: https://meridian-notify.invalid/webhooks/signed
    method: POST
    headers:
      X-Meridian-Receiver: synthetic-signed
    timeout_seconds: 5
    retry_count: 0
    verify_tls: true
    auth_type: none
    signing:
      algorithm: hmac-sha256
      secret_ref: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/webhook/signing_secret'') }}'
      signature_header: X-Meridian-Signature
      timestamp_header: X-Meridian-Timestamp
      signed_content: timestamp_dot_body
      prefix: sha256=
schedules:
- name: Nightly config backup (demo)
  flow: 'Ops: Backup lab configs to Git'
  schedule_type: recurring
  cron_expression: 0 2 * * *
  timezone: UTC
  params:
    change_id: CHG-NIGHTLY
    dry_run: true
  enabled: true
- name: Weekly routing health check (demo)
  flow: 'Net: Lab routing health check'
  schedule_type: recurring
  cron_expression: 0 6 * * 1
  timezone: UTC
  params: {}
  enabled: true
- name: Hourly reachability sweep (demo)
  flow: 'Net: Lab routing health check'
  schedule_type: recurring
  interval_seconds: 3600
  timezone: UTC
  params: {}
  enabled: true
- name: Monthly announcement rehearsal (demo)
  flow: 'Ops: Announce service prefix'
  schedule_type: recurring
  cron_expression: 0 9 1 * *
  timezone: UTC
  params:
    loopback_id: 150
    service_address: 10.200.150.1
    advertise: true
    ospf_area: '0'
    change_id: CHG-REHEARSAL
  enabled: false
- name: Planned maintenance rehearsal (demo)
  flow: 'Net: Lab routing health check'
  schedule_type: one_time
  run_at: '2029-05-16T02:00:00+00:00'
  timezone: UTC
  params: {}
  enabled: true
webhooks:
- name: 'Meridian Webhook: GitOps drift detected'
  description: Synthetic GitOps drift event that triggers a configuration backup.
  flows:
  - 'Ops: Backup lab configs to Git'
  auth_mode: bearer
  replay_window_seconds: 0
  rate_limit_per_minute: 20
  allowed_source_ips:
  - 203.0.113.0/24
  payload_mapping:
    run_name: $.repository.full_name
    params:
      change_id: $.change.id
      source: gitops
  enabled: true
- name: 'Meridian Webhook: Monitoring alarm'
  description: Synthetic monitoring alarm that triggers a routing health check.
  flows:
  - 'Net: Lab routing health check'
  auth_mode: hmac_sha256
  replay_window_seconds: 300
  rate_limit_per_minute: 60
  allowed_source_ips:
  - 192.0.2.0/24
  payload_mapping:
    run_name: $.alarm.name
    params:
      alarm: $.alarm.name
      severity: $.alarm.severity
      source: monitoring
  enabled: true
- name: 'Meridian Webhook: ITSM change window'
  description: Synthetic ITSM change-window event that triggers a service prefix announcement.
  flows:
  - 'Ops: Announce service prefix'
  auth_mode: hmac_sha256
  replay_window_seconds: 600
  rate_limit_per_minute: 15
  allowed_source_ips:
  - 192.0.2.0/24
  - 198.51.100.0/24
  payload_mapping:
    run_name: $.number
    params:
      change_id: $.number
      service_address: $.change.service_address
      source: itsm
  enabled: true
flow_subscriptions:
- flow: 'Ops: Backup lab configs to Git'
  destination: Meridian NOC Email
  event: run.completed
  enabled: true
- flow: 'Ops: Backup lab configs to Git'
  destination: Meridian NOC Email
  event: run.failed
  enabled: true
- flow: 'Ops: Announce service prefix'
  destination: Meridian NOC Email
  event: approval.requested
  enabled: true
- flow: 'Ops: Announce service prefix'
  destination: Meridian NOC Email
  event: run.completed
  enabled: true
- flow: 'Ops: Announce service prefix'
  destination: Meridian Slack
  event: run.completed
  enabled: false
- flow: 'Net: Lab routing health check'
  destination: Meridian Security Email
  event: run.failed
  enabled: true
- flow: 'Net: End-to-end reachability test'
  destination: Meridian Security Email
  event: run.failed
  enabled: true
- flow: 'Net: Lab routing health check'
  destination: 'Meridian Webhook: Signed HMAC'
  event: run.failed
  enabled: false
- flow: 'Lab: Provision and tear down demo datacenter'
  destination: Meridian NOC Email
  event: approval.requested
  enabled: true
