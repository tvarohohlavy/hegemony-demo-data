- name: 'Ops: Backup lab configs to Git'
  description: Collect running configuration from the selected routers and commit it to a Git repository. Dry run (default)
    commits locally and prints the result; unchecking Dry run pushes to the demo Gitea config-backups repository.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: collect_configs
        name: Collect running configs
        type: step
        kind: CHECK
        phase: PREPARE
        handler: netcli.collect_evidence
        position_x: 320
        position_y: 120
        target_selectors:
        - type: role
          role: backup_targets
        params:
          commands:
          - show running-config
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: package_push
        name: Package and push to Git
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 640
        position_y: 120
        params:
          image: alpine/git:v2.45.2
          entrypoint: /bin/sh
          working_dir: /workspace
          network_mode: host
          timeout_seconds: 180
          env:
            GIT_USER: '{{ secret(''vault://orgs/default/secrets/meridian/gitea/admin/username'') }}'
            GIT_PASS: '{{ secret(''vault://orgs/default/secrets/meridian/gitea/admin/password'') }}'
          command:
          - "set -e\n# Credentials never appear in the remote URL (they would leak\n# into evidence via git error output);\
            \ git asks this helper.\nCRED_HELPER='!f() { echo \"username=${GIT_USER}\"; echo \"password=${GIT_PASS}\"; };\
            \ f'\nDRY=$(printf '%s' \"{{ inputs.dry_run }}\" | tr 'A-Z' 'a-z')\nWORK=$(mktemp -d)\ncd \"$WORK\"\ncase \"$DRY\"\
            \ in\n  true|1|yes)\n    DRY=true\n    git init -q -b main .\n    ;;\n  *)\n    DRY=false\n    # Clone so each\
            \ backup appends to the repository history.\n    git -c credential.helper=\"$CRED_HELPER\" clone -q \\\n     \
            \ \"http://localhost:3000/{{ vars.GITEA_ORG }}/config-backups.git\" .\n    ;;\nesac\ngit config user.email \"\
            {{ vars.NOC_CONTACT }}\"\ngit config user.name \"{{ vars.ORG_NAME }} Automation\"\nrm -rf configs\nmkdir -p configs\n\
            cp -ar /artifacts/collect_configs/* configs/ 2>/dev/null || true\nCOUNT=$(find configs -type f | wc -l)\nif [\
            \ \"$COUNT\" -eq 0 ]; then\n  echo \"ERROR: no device configurations were collected\" >&2\n  exit 1\nfi\n{\n \
            \ printf 'Change: %s\\nDevices: %s\\nGenerated: %s\\n' \\\n    \"{{ inputs.change_id }}\" \"$COUNT\" \"$(date\
            \ -u +%FT%TZ)\"\n  printf 'Maintenance window: {{ vars.MAINT_WINDOW }}\\n'\n  printf 'Org standards: ntp={{ vars.NTP_PRIMARY\
            \ }} dns={{ vars.DNS_PRIMARY }} syslog={{ vars.SYSLOG_PRIMARY }}\\n'\n} > MANIFEST.txt\ngit add -A\ngit commit\
            \ -q -m \"{{ inputs.change_id }}: backup ${COUNT} device config(s)\"\necho \"Committed:\"; git log --oneline -1\n\
            if [ \"$DRY\" = \"true\" ]; then\n  echo \"DRY RUN - not pushing. Contents:\"\n  git show --stat --oneline HEAD\
            \ | head -50\nelse\n  git -c credential.helper=\"$CRED_HELPER\" push -q origin HEAD:main\n  echo \"Pushed to {{\
            \ vars.GITEA_URL }}/{{ vars.GITEA_ORG }}/config-backups\"\nfi\n"
        policy:
          timeout_sec: 200
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: done
        name: Backup complete
        type: terminal
        terminal_status: success
        position_x: 960
        position_y: 40
      - id: failed
        name: Backup failed
        type: terminal
        terminal_status: failure
        position_x: 960
        position_y: 240
      edges:
      - id: e_start_collect
        source: start:start
        target: collect_configs
      - id: e_collect_package
        source: collect_configs:success
        target: package_push
      - id: e_collect_failed
        source: collect_configs:failure
        target: failed
      - id: e_package_done
        source: package_push:success
        target: done
      - id: e_package_failed
        source: package_push:failure
        target: failed
    outputs:
      git_result:
        type: string
        label: Backup result
        expression: '{{ steps[''package_push''].output.stdout }}'
        description: Output of the packaging/push step (commit line or push confirmation).
    interface_graph:
      nodes:
      - id: sec_targets
        kind: section
        position_x: 80
        position_y: 80
        width: 480
        height: 200
        data:
          label: Target routers
          description: Routers whose running configuration will be backed up.
          runtime_layout: card
          collapsible: false
      - id: f_targets
        kind: field
        parent_id: sec_targets
        position_x: 40
        position_y: 60
        data:
          label: Routers
          field_id: targets
          field_type: inventory.device
          required: true
          description: Devices to back up — the lab routers, preselected.
          default_value:
          - dc1-core-01
          - dc1-core-02
          - dc1-acc-01
          - dc1-acc-02
          - dc2-core-01
          - dc2-core-02
          - dc2-acc-01
          - br1-edge-01
          - br1-acc-01
          - br2-edge-01
          - br2-acc-01
          config:
            role: backup_targets
            multiple: true
            option_source:
              kind: inventory.devices
      - id: sec_details
        kind: section
        position_x: 620
        position_y: 80
        width: 480
        height: 240
        data:
          label: Backup details
          runtime_layout: card
          collapsible: false
      - id: f_change_id
        kind: field
        parent_id: sec_details
        position_x: 40
        position_y: 60
        data:
          label: Change reference
          field_id: change_id
          field_type: core.text
          required: true
          default_value: CHG-1001
          description: Change record ID; used in the commit message.
          config:
            validations:
              combinator: AND
              children:
              - id: v_change_id
                op: regex
                operand:
                  kind: value
                  value: ^CHG-[0-9]+$
      - id: f_dry_run
        kind: field
        parent_id: sec_details
        position_x: 40
        position_y: 140
        data:
          label: Dry run
          field_id: dry_run
          field_type: core.bool
          required: false
          default_value: true
          description: Commit locally without pushing. Uncheck to push to Gitea.
          config: {}
      edges: []
- name: 'Ops: Announce service prefix'
  description: Advertise a service loopback prefix on the selected routers after approval. Collects pre-change evidence, applies
    the CLI change, collects post-change evidence, then confirms the running config actually changed (a diff is the success
    signal). The launch form demonstrates number/text/bool/enum fields, cross-field templated defaults, input validation,
    and a conditional (visible_when) field.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 200
      - id: approval
        name: Approve announcement
        type: approval
        phase: IMPLEMENTATION
        position_x: 300
        position_y: 200
        params:
          title: Approve service prefix announcement
          message: Advertise the requested service prefix on the selected routers? The prefix, OSPF settings and change ID
            are recorded in this run's inputs. Standard maintenance window applies.
          timeout_seconds: 3600
        policy:
          timeout_sec: 3600
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: precheck
        name: Pre-change evidence
        type: step
        kind: CHECK
        phase: PREPARE
        handler: netcli.collect_evidence
        position_x: 600
        position_y: 120
        target_selectors:
        - type: role
          role: announce_targets
        params:
          commands:
          - show running-config
          - show ip route ospf
          - show ip ospf neighbor
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: apply
        name: Apply prefix configuration
        type: step
        kind: ACTION
        phase: IMPLEMENTATION
        handler: netcli.execute
        position_x: 900
        position_y: 120
        target_selectors:
        - type: role
          role: announce_targets
        params:
          commands:
          - configure terminal
          - interface lo
          - ip address {{ inputs.service_address }}/32
          - '{% if inputs.advertise %}router ospf{% endif %}'
          - '{% if inputs.advertise %}network {{ inputs.service_address }}/32 area {{ inputs.ospf_area }}{% endif %}'
          - end
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: postcheck
        name: Post-change evidence
        type: step
        kind: CHECK
        phase: VERIFY
        handler: netcli.collect_evidence
        position_x: 1200
        position_y: 120
        target_selectors:
        - type: role
          role: announce_targets
        params:
          commands:
          - show running-config
          - show ip route ospf
          - show ip ospf neighbor
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: compare
        name: Confirm the config changed
        type: step
        kind: CHECK
        phase: VERIFY
        handler: evidence.compare
        position_x: 1500
        position_y: 120
        params:
          precheck_step_id: precheck
          postcheck_step_id: postcheck
          comparison_type: changed
          artifact_name_pattern: '*show running-config'
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: done
        name: Announcement complete
        type: terminal
        terminal_status: success
        position_x: 1800
        position_y: 40
      - id: failed
        name: Announcement failed
        type: terminal
        terminal_status: failure
        position_x: 1800
        position_y: 360
      edges:
      - id: e_start_approval
        source: start:start
        target: approval
      - id: e_approval_precheck
        source: approval:approved
        target: precheck
      - id: e_approval_rejected
        source: approval:rejected
        target: failed
      - id: e_approval_expired
        source: approval:expired
        target: failed
      - id: e_precheck_apply
        source: precheck:success
        target: apply
      - id: e_precheck_failed
        source: precheck:failure
        target: failed
      - id: e_apply_postcheck
        source: apply:success
        target: postcheck
      - id: e_apply_failed
        source: apply:failure
        target: failed
      - id: e_postcheck_compare
        source: postcheck:success
        target: compare
      - id: e_postcheck_failed
        source: postcheck:failure
        target: failed
      - id: e_compare_done
        source: compare:success
        target: done
      - id: e_compare_failed
        source: compare:failure
        target: failed
    interface_graph:
      nodes:
      - id: sec_targets
        kind: section
        position_x: 80
        position_y: 60
        width: 480
        height: 180
        data:
          label: Target routers
          runtime_layout: card
          collapsible: false
      - id: f_targets
        kind: field
        parent_id: sec_targets
        position_x: 40
        position_y: 60
        data:
          label: Routers
          field_id: targets
          field_type: inventory.device
          required: true
          description: Routers to advertise the service prefix on — the core, preselected.
          default_value:
          - dc1-core-01
          - dc1-core-02
          - dc2-core-01
          - dc2-core-02
          config:
            role: announce_targets
            multiple: true
            option_source:
              kind: inventory.devices
      - id: sec_prefix
        kind: section
        position_x: 620
        position_y: 60
        width: 520
        height: 220
        data:
          label: Service prefix
          runtime_layout: card
          collapsible: false
      - id: f_loopback_id
        kind: field
        parent_id: sec_prefix
        position_x: 40
        position_y: 60
        data:
          label: Loopback ID
          field_id: loopback_id
          field_type: core.number
          required: true
          default_value: 150
          description: Service loopback index (101-199).
          config:
            subtype: int
            validations:
              combinator: AND
              children:
              - id: v_lo_gt
                op: gt
                operand:
                  kind: value
                  value: 100
              - id: v_lo_lt
                op: lt
                operand:
                  kind: value
                  value: 200
      - id: f_service_address
        kind: field
        parent_id: sec_prefix
        position_x: 300
        position_y: 60
        data:
          label: Service address
          field_id: service_address
          field_type: core.text
          required: true
          default_value: 10.200.{{ inputs.loopback_id }}.1
          description: Host address advertised as a /32 (defaults from the loopback ID).
          config:
            validations:
              combinator: AND
              children:
              - id: v_addr
                op: regex
                operand:
                  kind: value
                  value: ^10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$
      - id: sec_advertise
        kind: section
        position_x: 620
        position_y: 320
        width: 520
        height: 200
        data:
          label: Advertisement
          runtime_layout: fieldset
          collapsible: false
      - id: f_advertise
        kind: field
        parent_id: sec_advertise
        position_x: 40
        position_y: 60
        data:
          label: Advertise into OSPF
          field_id: advertise
          field_type: core.bool
          required: false
          default_value: true
          description: Redistribute the service prefix into OSPF.
          config: {}
      - id: f_ospf_area
        kind: field
        parent_id: sec_advertise
        position_x: 300
        position_y: 60
        data:
          label: OSPF area
          field_id: ospf_area
          field_type: core.enum
          required: false
          default_value: '0'
          description: 'OSPF area to advertise into (shown only when advertising). The lab runs multi-area OSPF: pick the
            area the target routers participate in.'
          config:
            option_source:
              kind: core.static
              static_options:
              - value: '0'
                label: Area 0 (backbone)
              - value: '1'
                label: Area 1 (Lab DC1)
              - value: '2'
                label: Area 2 (Lab Branch 1)
              - value: '3'
                label: Area 3 (Lab Branch 2)
              - value: '4'
                label: Area 4 (Lab DC2)
      - id: sec_change
        kind: section
        position_x: 1200
        position_y: 60
        width: 480
        height: 180
        data:
          label: Change record
          runtime_layout: card
          collapsible: false
      - id: f_change_id
        kind: field
        parent_id: sec_change
        position_x: 40
        position_y: 60
        data:
          label: Change reference
          field_id: change_id
          field_type: core.text
          required: true
          default_value: CHG-1002
          description: Change record ID quoted in the approval prompt.
          config:
            validations:
              combinator: AND
              children:
              - id: v_change_id
                op: regex
                operand:
                  kind: value
                  value: ^CHG-[0-9]+$
      edges:
      - id: e_advertise_area
        source: f_advertise
        target: f_ospf_area
        relations:
        - semantic_type: visible_when
          operator: truthy
          value: null
- name: 'Net: Lab routing health check'
  description: Verify the selected routers are reachable and their OSPF adjacencies are Full. Runs a TCP reachability probe,
    collects OSPF state, and asserts on the neighbor output.
  git_repository: flow-backups
  git_path: flows/net-lab-routing-health-check.yaml
  git_branch: main
  sync_mode: synced
  auto_commit: true
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: reachable
        name: Reachability probe (TCP/22)
        type: step
        kind: CHECK
        phase: PREPARE
        handler: probe.connectivity
        position_x: 300
        position_y: 120
        target_selectors:
        - type: role
          role: health_targets
        params:
          check_type: tcp_connect
          port: 22
          timeout_sec: 10
          attempts: 2
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: neighbors
        name: Collect OSPF state
        type: step
        kind: CHECK
        phase: VERIFY
        handler: netcli.collect_evidence
        position_x: 600
        position_y: 120
        target_selectors:
        - type: role
          role: health_targets
        params:
          commands:
          - show ip ospf neighbor
          - show ip route ospf
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: assert_full
        name: Assert OSPF neighbors Full
        type: step
        kind: CHECK
        phase: VERIFY
        handler: evidence.assert
        position_x: 900
        position_y: 120
        params:
          artifact_step_id: neighbors
          target_role: health_targets
          command: show ip ospf neighbor
          operator: contains
          expected: Full
          message: OSPF neighbors are not Full on at least one router.
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: done
        name: Healthy
        type: terminal
        terminal_status: success
        position_x: 1200
        position_y: 40
      - id: failed
        name: Unhealthy
        type: terminal
        terminal_status: failure
        position_x: 1200
        position_y: 240
      edges:
      - id: e_start_reachable
        source: start:start
        target: reachable
      - id: e_reachable_neighbors
        source: reachable:success
        target: neighbors
      - id: e_reachable_failed
        source: reachable:failure
        target: failed
      - id: e_neighbors_assert
        source: neighbors:success
        target: assert_full
      - id: e_neighbors_failed
        source: neighbors:failure
        target: failed
      - id: e_assert_done
        source: assert_full:success
        target: done
      - id: e_assert_failed
        source: assert_full:failure
        target: failed
    interface_graph:
      nodes:
      - id: sec_targets
        kind: section
        position_x: 80
        position_y: 80
        width: 480
        height: 180
        data:
          label: Target routers
          runtime_layout: card
          collapsible: false
      - id: f_targets
        kind: field
        parent_id: sec_targets
        position_x: 40
        position_y: 60
        data:
          label: Routers
          field_id: targets
          field_type: inventory.device
          required: true
          description: Routers to health-check — the whole lab fabric, preselected.
          default_value:
          - dc1-core-01
          - dc1-core-02
          - dc1-acc-01
          - dc1-acc-02
          - dc2-core-01
          - dc2-core-02
          - dc2-acc-01
          - br1-edge-01
          - br1-acc-01
          - br2-edge-01
          - br2-acc-01
          config:
            role: health_targets
            multiple: true
            option_source:
              kind: inventory.devices
      edges: []
- name: 'Net: End-to-end reachability test'
  description: Log into the selected Linux endpoint hosts over SSH and ping the chosen lab destinations across the routed
    fabric — a true end-to-end test from host LAN to host LAN through multi-area OSPF. Demonstrates the remote shell (exec-channel)
    paradigm on plain Linux devices.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: reachable
        name: Reachability probe (TCP/22)
        type: step
        kind: CHECK
        phase: PREPARE
        handler: probe.connectivity
        position_x: 300
        position_y: 120
        target_selectors:
        - type: role
          role: probe_sources
        params:
          check_type: tcp_connect
          port: 22
          timeout_sec: 10
          attempts: 2
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: host_facts
        name: Collect host facts
        type: step
        kind: ACTION
        phase: PREPARE
        handler: shell.execute
        position_x: 600
        position_y: 120
        target_selectors:
        - type: role
          role: probe_sources
        params:
          shell: default
          fail_fast: true
          command_timeout_sec: 30
          commands:
          - uname -a
          - ip -brief address
          - ip route show
        policy:
          timeout_sec: 90
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: ping_targets
        name: Ping selected destinations
        type: step
        kind: ACTION
        phase: VERIFY
        handler: shell.execute
        position_x: 900
        position_y: 120
        target_selectors:
        - type: role
          role: probe_sources
        params:
          shell: sh
          fail_fast: true
          command_timeout_sec: 120
          commands:
          - FAIL=0; for t in {{ inputs.ping_targets | join(" ") }}; do echo "--- ping $t ---"; ping -c 3 -W 2 "$t" || FAIL=1;
            done; exit $FAIL
        policy:
          timeout_sec: 180
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: done
        name: All destinations reachable
        type: terminal
        terminal_status: success
        position_x: 1200
        position_y: 40
      - id: failed
        name: Reachability failed
        type: terminal
        terminal_status: failure
        position_x: 1200
        position_y: 240
      edges:
      - id: e_start_reachable
        source: start:start
        target: reachable
      - id: e_reachable_facts
        source: reachable:success
        target: host_facts
      - id: e_reachable_failed
        source: reachable:failure
        target: failed
      - id: e_facts_ping
        source: host_facts:success
        target: ping_targets
      - id: e_facts_failed
        source: host_facts:failure
        target: failed
      - id: e_ping_done
        source: ping_targets:success
        target: done
      - id: e_ping_failed
        source: ping_targets:failure
        target: failed
    interface_graph:
      nodes:
      - id: sec_sources
        kind: section
        position_x: 80
        position_y: 80
        width: 480
        height: 200
        data:
          label: Probe sources
          description: Linux endpoint hosts to run the test from.
          runtime_layout: card
          collapsible: false
      - id: f_sources
        kind: field
        parent_id: sec_sources
        position_x: 40
        position_y: 60
        data:
          label: Endpoint hosts
          field_id: sources
          field_type: inventory.device
          required: true
          description: Lab endpoint hosts (role server) to probe from — preselected.
          default_value:
          - dc1-srv-01
          - dc2-srv-01
          - br1-srv-01
          - br2-srv-01
          config:
            role: probe_sources
            multiple: true
            option_source:
              kind: inventory.devices
      - id: sec_destinations
        kind: section
        position_x: 620
        position_y: 80
        width: 520
        height: 220
        data:
          label: Destinations
          runtime_layout: card
          collapsible: false
      - id: f_ping_targets
        kind: field
        parent_id: sec_destinations
        position_x: 40
        position_y: 60
        data:
          label: Ping destinations
          field_id: ping_targets
          field_type: core.multi_enum
          required: true
          default_value:
          - 10.101.1.10
          - 10.104.1.10
          description: Lab addresses each source host must reach.
          config:
            multiple: true
            option_source:
              kind: core.static
              static_options:
              - value: 10.101.1.10
                label: dc1-srv-01 (Lab DC1 endpoint LAN)
              - value: 10.104.1.10
                label: dc2-srv-01 (Lab DC2 endpoint LAN)
              - value: 10.102.1.10
                label: br1-srv-01 (Lab Branch 1 endpoint LAN)
              - value: 10.103.1.10
                label: br2-srv-01 (Lab Branch 2 endpoint LAN)
              - value: 10.255.255.1
                label: dc1-core-01 loopback (backbone)
              - value: 10.255.255.9
                label: dc2-core-01 loopback (backbone)
      edges: []
