- flow: 'Lab: Provision and tear down demo datacenter'
  filename: Dockerfile
  content: "# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>\n# SPDX-License-Identifier: AGPL-3.0-or-later\n\
    #\n# FRRouting + OpenSSH lab node. The stock FRR image has no SSH server, so\n# Hegemony's network CLI step handlers (netmiko\
    \ over the device access config)\n# cannot reach it. This image adds sshd and a non-root \"clab\" login whose login\n\
    # SHELL IS vtysh: an SSH session drops straight into FRR's Cisco-IOS-style CLI,\n# so Hegemony's netcli handlers (platform\
    \ ios-xe -> netmiko cisco_ios) drive it\n# exactly like a real switch. clab is a member of the frr/frrvty groups so vtysh\n\
    # can reach the daemon sockets.\n#\n# Built locally by \"Lab: Bootstrap demo datacenter\" and referenced from\n# topology.clab.yml\
    \ as image \"meridian/frr-lab:latest\".\nFROM quay.io/frrouting/frr:9.1.0\n\n# The login password is injected at build\
    \ time from the meridian-lab-ssh vault\n# secret (see the Bootstrap flow's build step), so the secret stays the single\n\
    # source of truth. The default only covers standalone `docker build` use.\nARG LAB_PASSWORD=demo-lab-password\n\n# openssh\
    \ for the SSH channel; shadow for chpasswd.\nRUN apk add --no-cache openssh openssh-server shadow \\\n    && ssh-keygen\
    \ -A \\\n    && sed -i 's/^#\\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config \\\n    && sed\
    \ -i 's/^#\\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config \\\n    && adduser -D -s /usr/bin/vtysh clab\
    \ \\\n    && addgroup clab frr \\\n    && addgroup clab frrvty \\\n    && echo \"clab:${LAB_PASSWORD}\" | chpasswd\n\n\
    COPY entrypoint.sh /usr/local/bin/lab-entrypoint.sh\nRUN chmod +x /usr/local/bin/lab-entrypoint.sh\n\nENTRYPOINT [\"/usr/local/bin/lab-entrypoint.sh\"\
    ]\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: entrypoint.sh
  content: '#!/bin/sh

    # SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>

    # SPDX-License-Identifier: AGPL-3.0-or-later

    #

    # Start the SSH server, then hand off to FRR''s normal container entrypoint so

    # zebra/ospfd come up exactly as in the stock image.

    set -e

    /usr/sbin/sshd

    exec /sbin/tini -- /usr/lib/frr/docker-start

    '
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: host/Dockerfile
  content: "# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>\n# SPDX-License-Identifier: AGPL-3.0-or-later\n\
    #\n# Lightweight Linux endpoint for the Meridian lab: an Alpine host with sshd so\n# Hegemony's shell.execute handler\
    \ can log in like to any server, plus\n# iproute2/iputils for end-to-end reachability tests across the routed fabric.\n\
    # ping gets cap_net_raw so the non-root login can run it.\n#\n# Built locally by \"Lab: Provision and tear down demo datacenter\"\
    \ and\n# referenced from topology.clab.yml as image \"meridian/lab-host:latest\".\nFROM alpine:3.20\n\n# The login password\
    \ is injected at build time from the meridian-lab-ssh vault\n# secret (same credential the git inventory provider hands\
    \ to the routers).\nARG LAB_PASSWORD=demo-lab-password\n\nRUN apk add --no-cache openssh iproute2 iputils libcap-utils\
    \ \\\n    && ssh-keygen -A \\\n    && sed -i 's/^#\\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config\
    \ \\\n    && sed -i 's/^#\\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config \\\n    && adduser -D -s /bin/sh\
    \ clab \\\n    && echo \"clab:${LAB_PASSWORD}\" | chpasswd \\\n    && setcap cap_net_raw+ep \"$(command -v ping)\"\n\n\
    COPY entrypoint.sh /usr/local/bin/host-entrypoint.sh\nRUN chmod +x /usr/local/bin/host-entrypoint.sh\n\nENTRYPOINT [\"\
    /usr/local/bin/host-entrypoint.sh\"]\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: host/entrypoint.sh
  content: '#!/bin/sh

    # SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>

    # SPDX-License-Identifier: AGPL-3.0-or-later

    #

    # Start the SSH server and idle. LAN addressing and routes are applied by

    # containerlab exec directives in topology.clab.yml after the links exist.

    set -e

    /usr/sbin/sshd

    exec sleep infinity

    '
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: topology.clab.yml
  content: "# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>\n# SPDX-License-Identifier: AGPL-3.0-or-later\n\
    #\n# Meridian virtual lab: eleven FRR routers and four Linux endpoint hosts across\n# four lab sites running multi-area\
    \ OSPF.\n#\n#   dc1 (area 1): dc1-core-01/02 are ABRs on the area-0 backbone; two access\n#                 routers are\
    \ dual-homed to both cores; dc1-srv-01 hangs off\n#                 dc1-acc-01 on LAN 10.101.1.0/24.\n#   dc2 (area 4):\
    \ dc2-core-01/02 ABRs, meshed to dc1 over the backbone and\n#                 each connected to one branch; dc2-acc-01\
    \ dual-homed;\n#                 dc2-srv-01 on LAN 10.104.1.0/24.\n#   br1 (area 2): br1-edge-01 ABR homed to dc1-core-01/02\
    \ and dc2-core-01;\n#                 br1-srv-01 on LAN 10.102.1.0/24.\n#   br2 (area 3): br2-edge-01 ABR homed to dc1-core-01/02\
    \ and dc2-core-02;\n#                 br2-srv-01 on LAN 10.103.1.0/24.\n#\n# Endpoint hosts run sshd (image meridian/lab-host)\
    \ so Hegemony's shell.execute\n# reaches them like any server; clab exec directives give them a LAN address\n# and a 10.0.0.0/8\
    \ route via their access router (management stays on eth0).\n#\n# Static management addresses (172.20.30.0/24) so the\
    \ seeded Git inventory can\n# target every node by mgmt_host:\n#   dc1: .11-.15   br1: .21-.23   br2: .31-.33   dc2: .41-.44\n\
    #\n# The __HEGEMONY_CLAB_*__ placeholders are substituted by the Bootstrap flow at\n# deploy time so the bind sources\
    \ resolve identically inside the orchestrator\n# container and on the host Docker daemon that creates the node containers.\n\
    name: __HEGEMONY_CLAB_NAME__\n\nmgmt:\n  network: meridian-lab-mgmt\n  ipv4-subnet: 172.20.30.0/24\n\ntopology:\n  kinds:\n\
    \    linux:\n      image: meridian/frr-lab:latest\n      # Shared FRR daemons file (zebra + ospfd); per-router frr.conf\
    \ is bound\n      # per node below. Endpoint hosts override the image and carry no binds.\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/daemons:/etc/frr/daemons\n\
    \        - __HEGEMONY_CLAB_WORKDIR__/frr/vtysh.conf:/etc/frr/vtysh.conf\n  nodes:\n    # ── dc1 ──────────────────────────────────────────────────────────────\n\
    \    dc1-core-01:\n      kind: linux\n      mgmt-ipv4: 172.20.30.11\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/dc1-core-01.conf:/etc/frr/frr.conf\n\
    \    dc1-core-02:\n      kind: linux\n      mgmt-ipv4: 172.20.30.12\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/dc1-core-02.conf:/etc/frr/frr.conf\n\
    \    dc1-acc-01:\n      kind: linux\n      mgmt-ipv4: 172.20.30.13\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/dc1-acc-01.conf:/etc/frr/frr.conf\n\
    \    dc1-acc-02:\n      kind: linux\n      mgmt-ipv4: 172.20.30.14\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/dc1-acc-02.conf:/etc/frr/frr.conf\n\
    \    dc1-srv-01:\n      kind: linux\n      image: meridian/lab-host:latest\n      mgmt-ipv4: 172.20.30.15\n      binds:\
    \ []\n      exec:\n        - ip address add 10.101.1.10/24 dev eth1\n        - ip route add 10.0.0.0/8 via 10.101.1.1\
    \ dev eth1\n    # ── dc2 ──────────────────────────────────────────────────────────────\n    dc2-core-01:\n      kind:\
    \ linux\n      mgmt-ipv4: 172.20.30.41\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/dc2-core-01.conf:/etc/frr/frr.conf\n\
    \    dc2-core-02:\n      kind: linux\n      mgmt-ipv4: 172.20.30.42\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/dc2-core-02.conf:/etc/frr/frr.conf\n\
    \    dc2-acc-01:\n      kind: linux\n      mgmt-ipv4: 172.20.30.43\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/dc2-acc-01.conf:/etc/frr/frr.conf\n\
    \    dc2-srv-01:\n      kind: linux\n      image: meridian/lab-host:latest\n      mgmt-ipv4: 172.20.30.44\n      binds:\
    \ []\n      exec:\n        - ip address add 10.104.1.10/24 dev eth1\n        - ip route add 10.0.0.0/8 via 10.104.1.1\
    \ dev eth1\n    # ── br1 ──────────────────────────────────────────────────────────────\n    br1-edge-01:\n      kind:\
    \ linux\n      mgmt-ipv4: 172.20.30.21\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/br1-edge-01.conf:/etc/frr/frr.conf\n\
    \    br1-acc-01:\n      kind: linux\n      mgmt-ipv4: 172.20.30.22\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/br1-acc-01.conf:/etc/frr/frr.conf\n\
    \    br1-srv-01:\n      kind: linux\n      image: meridian/lab-host:latest\n      mgmt-ipv4: 172.20.30.23\n      binds:\
    \ []\n      exec:\n        - ip address add 10.102.1.10/24 dev eth1\n        - ip route add 10.0.0.0/8 via 10.102.1.1\
    \ dev eth1\n    # ── br2 ──────────────────────────────────────────────────────────────\n    br2-edge-01:\n      kind:\
    \ linux\n      mgmt-ipv4: 172.20.30.31\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/br2-edge-01.conf:/etc/frr/frr.conf\n\
    \    br2-acc-01:\n      kind: linux\n      mgmt-ipv4: 172.20.30.32\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/br2-acc-01.conf:/etc/frr/frr.conf\n\
    \    br2-srv-01:\n      kind: linux\n      image: meridian/lab-host:latest\n      mgmt-ipv4: 172.20.30.33\n      binds:\
    \ []\n      exec:\n        - ip address add 10.103.1.10/24 dev eth1\n        - ip route add 10.0.0.0/8 via 10.103.1.1\
    \ dev eth1\n  links:\n    # Area 0 backbone\n    - endpoints: [\"dc1-core-01:eth1\", \"dc1-core-02:eth1\"]   # 10.0.0.0/30\n\
    \    - endpoints: [\"dc1-core-01:eth2\", \"br1-edge-01:eth1\"]   # 10.0.1.0/30\n    - endpoints: [\"dc1-core-02:eth2\"\
    , \"br1-edge-01:eth2\"]   # 10.0.2.0/30\n    - endpoints: [\"dc1-core-01:eth3\", \"br2-edge-01:eth1\"]   # 10.0.3.0/30\n\
    \    - endpoints: [\"dc1-core-02:eth3\", \"br2-edge-01:eth2\"]   # 10.0.4.0/30\n    - endpoints: [\"dc2-core-01:eth1\"\
    , \"dc2-core-02:eth1\"]   # 10.0.5.0/30\n    - endpoints: [\"dc1-core-01:eth6\", \"dc2-core-01:eth2\"]   # 10.0.6.0/30\n\
    \    - endpoints: [\"dc1-core-02:eth6\", \"dc2-core-02:eth2\"]   # 10.0.7.0/30\n    - endpoints: [\"dc2-core-01:eth3\"\
    , \"br1-edge-01:eth4\"]   # 10.0.8.0/30\n    - endpoints: [\"dc2-core-02:eth3\", \"br2-edge-01:eth4\"]   # 10.0.9.0/30\n\
    \    # Area 1 (dc1 access, dual-homed) + endpoint LAN\n    - endpoints: [\"dc1-core-01:eth4\", \"dc1-acc-01:eth1\"]  \
    \  # 10.1.1.0/30\n    - endpoints: [\"dc1-core-02:eth4\", \"dc1-acc-01:eth2\"]    # 10.1.2.0/30\n    - endpoints: [\"\
    dc1-core-01:eth5\", \"dc1-acc-02:eth1\"]    # 10.1.3.0/30\n    - endpoints: [\"dc1-core-02:eth5\", \"dc1-acc-02:eth2\"\
    ]    # 10.1.4.0/30\n    - endpoints: [\"dc1-acc-01:eth3\", \"dc1-srv-01:eth1\"]     # 10.101.1.0/24\n    # Area 4 (dc2\
    \ access, dual-homed) + endpoint LAN\n    - endpoints: [\"dc2-core-01:eth4\", \"dc2-acc-01:eth1\"]    # 10.4.1.0/30\n\
    \    - endpoints: [\"dc2-core-02:eth4\", \"dc2-acc-01:eth2\"]    # 10.4.2.0/30\n    - endpoints: [\"dc2-acc-01:eth3\"\
    , \"dc2-srv-01:eth1\"]     # 10.104.1.0/24\n    # Area 2 (br1) / Area 3 (br2) + endpoint LANs\n    - endpoints: [\"br1-edge-01:eth3\"\
    , \"br1-acc-01:eth1\"]    # 10.2.1.0/30\n    - endpoints: [\"br1-acc-01:eth2\", \"br1-srv-01:eth1\"]     # 10.102.1.0/24\n\
    \    - endpoints: [\"br2-edge-01:eth3\", \"br2-acc-01:eth1\"]    # 10.3.1.0/30\n    - endpoints: [\"br2-acc-01:eth2\"\
    , \"br2-srv-01:eth1\"]     # 10.103.1.0/24\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/daemons
  content: '# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>

    # SPDX-License-Identifier: AGPL-3.0-or-later

    # Only zebra (forwarding) and ospfd (the demo routing protocol) are enabled.

    zebra=yes

    bgpd=no

    ospfd=yes

    ospf6d=no

    ripd=no

    ripngd=no

    isisd=no

    pimd=no

    ldpd=no

    nhrpd=no

    eigrpd=no

    babeld=no

    sharpd=no

    pbrd=no

    bfdd=no

    fabricd=no

    vrrpd=no


    vtysh_enable=yes

    zebra_options="  -A 127.0.0.1 -s 90000000"

    bgpd_options="   -A 127.0.0.1"

    ospfd_options="  -A 127.0.0.1"

    ospf6d_options=" -A ::1"

    ripd_options="   -A 127.0.0.1"

    ripngd_options=" -A ::1"

    isisd_options="  -A 127.0.0.1"

    pimd_options="   -A 127.0.0.1"

    ldpd_options="   -A 127.0.0.1"

    nhrpd_options="  -A 127.0.0.1"

    eigrpd_options=" -A 127.0.0.1"

    babeld_options=" -A 127.0.0.1"

    sharpd_options=" -A 127.0.0.1"

    pbrd_options="   -A 127.0.0.1"

    staticd_options="-A 127.0.0.1"

    bfdd_options="   -A 127.0.0.1"

    fabricd_options="-A 127.0.0.1"

    vrrpd_options="  -A 127.0.0.1"

    '
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/vtysh.conf
  content: 'service integrated-vtysh-config

    '
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/dc1-core-01.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname dc1-core-01\nservice integrated-vtysh-config\n!\ninterface\
    \ lo\n ip address 10.255.255.1/32\n!\ninterface eth1\n description to-dc1-core-02\n ip address 10.0.0.1/30\n!\ninterface\
    \ eth2\n description to-br1-edge-01\n ip address 10.0.1.1/30\n!\ninterface eth3\n description to-br2-edge-01\n ip address\
    \ 10.0.3.1/30\n!\ninterface eth4\n description to-dc1-acc-01\n ip address 10.1.1.1/30\n!\ninterface eth5\n description\
    \ to-dc1-acc-02\n ip address 10.1.3.1/30\n!\ninterface eth6\n description to-dc2-core-01\n ip address 10.0.6.1/30\n!\n\
    router ospf\n ospf router-id 10.255.255.1\n network 10.255.255.1/32 area 0\n network 10.0.0.0/30 area 0\n network 10.0.1.0/30\
    \ area 0\n network 10.0.3.0/30 area 0\n network 10.1.1.0/30 area 1\n network 10.1.3.0/30 area 1\n network 10.0.6.0/30\
    \ area 0\n!\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/dc1-core-02.conf
