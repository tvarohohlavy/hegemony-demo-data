# Generated by scripts/build.py; edit src/bundles-acme/*.yaml instead.
schema_version: 2
organization: acme
secrets:
- name: acme-store-ssh
  description: SSH login for Acme's retail-store routers.
  folder: orgs/acme/secrets/store/ssh
  values:
    username: acme-netops
    password: demo-acme-store-password
sites:
- name: Acme HQ
  description: Acme Retail head office network.
  location: chicago
  tags:
    env: demo
    tenant: acme
    site_type: headquarters
- name: Store 100 - Chicago
  description: Acme flagship retail store.
  location: chicago
  parent: Acme HQ
  tags:
    env: demo
    tenant: acme
    site_type: store
devices:
- name: acme-hq-edge-01
  mgmt_host: 10.20.0.1
  vendor: Cisco
  platform: ios-xe
  model: C8300-1N1S-4T2X
  current_version: 17.12.4
  site: Acme HQ
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/password'') }}'
  tags:
    role: edge
    tenant: acme
- name: acme-store100-rtr-01
  mgmt_host: 10.20.100.1
  vendor: Cisco
  platform: ios-xe
  model: C1111-8P
  current_version: 17.12.4
  site: Acme HQ/Store 100 - Chicago
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/password'') }}'
  tags:
    role: store
    tenant: acme
- name: acme-store100-sw-01
  mgmt_host: 10.20.100.2
  vendor: Cisco
  platform: ios-xe
  model: C9300-24T
  current_version: 17.12.4
  site: Acme HQ/Store 100 - Chicago
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/password'') }}'
  tags:
    role: access
    tenant: acme
flows:
- name: 'Acme: Store standards check'
  description: Render Acme's effective network standards. Confirms the store-local NTP override wins over the shared standard
    while the others fall through to Meridian's shared baseline.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: render
        name: Render Acme standards
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 320
        position_y: 120
        mounted_files:
        - report.sh
        params:
          image: alpine:3.20
          working_dir: /workspace
          timeout_seconds: 120
          command:
          - sh /attachments/report.sh
          env:
            REPORT_NAME: acme-standards
            TENANT_NAME: '{{ vars.TENANT_NAME }}'
            NTP_PRIMARY: '{{ vars.NTP_PRIMARY }}'
            DNS_PRIMARY: '{{ vars.DNS_PRIMARY }}'
            SYSLOG_PRIMARY: '{{ vars.SYSLOG_PRIMARY }}'
        policy:
          timeout_sec: 150
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: done
        name: Standards rendered
        type: terminal
        terminal_status: success
        position_x: 640
        position_y: 120
      edges:
      - id: e_start_render
        source: start:start
        target: render
      - id: e_render_done
        source: render:success
        target: done
    interface_graph:
      nodes: []
      edges: []
flow_attachments:
- flow: 'Acme: Store standards check'
  filename: report.sh
  content: "#!/bin/sh\n# SPDX-FileCopyrightText: 2025-2026 Jakub Travnik <jakub.travnik@gmail.com>\n# SPDX-License-Identifier:\
    \ AGPL-3.0-or-later\n#\n# Render an organization's effective network standards into a run artifact.\n# Mounted into the\
    \ container at /attachments and run as-is; all the org-specific\n# values arrive as environment variables the flow resolves\
    \ from {{ vars.* }} and\n# {{ secret(...) }}, so this one script serves the shared, Acme and Globex\n# standards flows\
    \ unchanged.\nset -eu\n\nmkdir -p /artifacts/new\nREPORT=\"/artifacts/new/${REPORT_NAME:-standards}.txt\"\n\n{\n  printf\
    \ 'Effective network standards\\n'\n  printf 'Organization : %s\\n' \"${TENANT_NAME:-unknown}\"\n  printf 'Curated by\
    \   : %s\\n' \"${STANDARDS_OWNER:-Meridian Shared Standards}\"\n  printf '  NTP primary    : %s\\n' \"${NTP_PRIMARY:-<unset>}\"\
    \n  printf '  DNS primary    : %s\\n' \"${DNS_PRIMARY:-<unset>}\"\n  printf '  Syslog primary : %s\\n' \"${SYSLOG_PRIMARY:-<unset>}\"\
    \n  if [ -n \"${APPROVED_CONTAINER_IMAGES:-}\" ]; then\n    printf '  Approved images: %s\\n' \"${APPROVED_CONTAINER_IMAGES}\"\
    \n  fi\n  if [ -n \"${MON_TOKEN:-}\" ]; then\n    printf '  Monitoring token: present (shared, masked)\\n'\n  fi\n} |\
    \ tee \"${REPORT}\"\n"
variables:
- name: NTP_PRIMARY
  value: 10.20.0.123
  description: Acme store-local NTP appliance. Overrides the shared NTP standard for this org.
- name: TENANT_NAME
  value: Acme Retail
  description: Tenant display name stamped into Acme's own flow output.
notification_destinations:
- name: 'Acme: NetOps Email'
  type: email
  enabled: true
  config_json:
    to:
    - netops@acme.example
    from: hegemony@acme.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
flow_subscriptions:
- flow: 'Acme: Store standards check'
  destination: 'Acme: NetOps Email'
  event: run.completed
  enabled: true
- flow: 'Acme: Store standards check'
  destination: 'Acme: NetOps Email'
  event: run.failed
  enabled: true
