schema_version: 2
organization: acme
secrets:
- name: acme-store-ssh
  description: SSH login for Acme's retail-store routers.
  folder: orgs/acme/secrets/store/ssh
  values:
    username: acme-netops
    password: demo-acme-store-password
sites:
- name: Acme HQ
  description: Acme Retail head office network.
  location: chicago
  tags:
    env: demo
    tenant: acme
    site_type: headquarters
- name: Store 100 - Chicago
  description: Acme flagship retail store.
  location: chicago
  parent: Acme HQ
  tags:
    env: demo
    tenant: acme
    site_type: store
devices:
- name: acme-hq-edge-01
  mgmt_host: 10.20.0.1
  vendor: Cisco
  platform: ios-xe
  model: C8300-1N1S-4T2X
  current_version: 17.12.4
  site: Acme HQ
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/password'') }}'
  tags:
    role: edge
    tenant: acme
- name: acme-store100-rtr-01
  mgmt_host: 10.20.100.1
  vendor: Cisco
  platform: ios-xe
  model: C1111-8P
  current_version: 17.12.4
  site: Acme HQ/Store 100 - Chicago
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/password'') }}'
  tags:
    role: store
    tenant: acme
- name: acme-store100-sw-01
  mgmt_host: 10.20.100.2
  vendor: Cisco
  platform: ios-xe
  model: C9300-24T
  current_version: 17.12.4
  site: Acme HQ/Store 100 - Chicago
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/acme/secrets/store/ssh/password'') }}'
  tags:
    role: access
    tenant: acme
flows:
- name: 'Acme: Store standards check'
  description: Render Acme's effective network standards. Confirms the store-local NTP override wins over the shared standard
    while the other standards fall through to Meridian's shared baseline.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: render
        name: Render Acme standards
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 320
        position_y: 120
        params:
          image: alpine:3.20
          working_dir: /workspace
          timeout_seconds: 120
          command:
          - "set -e\nmkdir -p /artifacts/new\n{\n  printf 'Tenant: %s\\n' \"{{ vars.TENANT_NAME }}\"\n  printf 'Effective\
            \ NTP (overridden) : %s\\n' \"{{ vars.NTP_PRIMARY }}\"\n  printf 'Effective DNS (shared)     : %s\\n' \"{{ vars.DNS_PRIMARY\
            \ }}\"\n  printf 'Effective syslog (shared)  : %s\\n' \"{{ vars.SYSLOG_PRIMARY }}\"\n} | tee /artifacts/new/acme-standards.txt\n"
        policy:
          timeout_sec: 150
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: done
        name: Standards rendered
        type: terminal
        terminal_status: success
        position_x: 640
        position_y: 120
      edges:
      - id: e_start_render
        source: start:start
        target: render
      - id: e_render_done
        source: render:success
        target: done
    interface_graph:
      nodes: []
      edges: []
variables:
- name: NTP_PRIMARY
  value: 10.20.0.123
  description: Acme store-local NTP appliance. Overrides the shared NTP standard for this org.
- name: TENANT_NAME
  value: Acme Retail
  description: Tenant display name stamped into Acme's own flow output.
notification_destinations:
- name: 'Acme: NetOps Email'
  type: email
  enabled: true
  config_json:
    to:
    - netops@acme.example
    from: hegemony@acme.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
flow_subscriptions:
- flow: 'Acme: Store standards check'
  destination: 'Acme: NetOps Email'
  event: run.completed
  enabled: true
- flow: 'Acme: Store standards check'
  destination: 'Acme: NetOps Email'
  event: run.failed
  enabled: true
