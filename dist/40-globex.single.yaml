# Generated by scripts/build.py; edit src/bundles-globex/*.yaml instead.
schema_version: 2
organization: globex
secrets:
- name: globex-plant-ssh
  description: SSH login for Globex's plant-floor routers.
  folder: orgs/globex/secrets/plant/ssh
  values:
    username: globex-netops
    password: demo-globex-plant-password
sites:
- name: Globex Plant 1 - Detroit
  description: Globex Manufacturing primary plant network.
  location: detroit
  tags:
    env: demo
    tenant: globex
    site_type: plant
devices:
- name: globex-plant1-core-01
  mgmt_host: 10.30.0.1
  vendor: Cisco
  platform: ios-xe
  model: C9500-24Y4C
  current_version: 17.12.4
  site: Globex Plant 1 - Detroit
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/globex/secrets/plant/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/globex/secrets/plant/ssh/password'') }}'
  tags:
    role: core
    tenant: globex
- name: globex-plant1-iot-gw-01
  mgmt_host: 10.30.0.2
  vendor: Cisco
  platform: ios-xe
  model: IR1101
  current_version: 17.12.4
  site: Globex Plant 1 - Detroit
  access_config:
    ssh:
      username_ref: '{{ secret(''vault://orgs/globex/secrets/plant/ssh/username'') }}'
      password_ref: '{{ secret(''vault://orgs/globex/secrets/plant/ssh/password'') }}'
  tags:
    role: iot-gateway
    tenant: globex
flows:
- name: 'Globex: Plant standards check'
  description: Render Globex's effective network standards — all inherited unchanged from Meridian's shared golden baseline.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: render
        name: Render Globex standards
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 320
        position_y: 120
        target_selectors:
        - type: role
          role: plant_devices
        mounted_files:
        - report.sh
        params:
          image: alpine:3.22
          working_dir: /workspace
          timeout_seconds: 120
          command:
          - sh /attachments/report.sh
          env:
            REPORT_NAME: globex-standards
            TENANT_NAME: '{{ vars.TENANT_NAME }}'
            NTP_PRIMARY: '{{ vars.NTP_PRIMARY }}'
            DNS_PRIMARY: '{{ vars.DNS_PRIMARY }}'
            SYSLOG_PRIMARY: '{{ vars.SYSLOG_PRIMARY }}'
        policy:
          timeout_sec: 150
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: done
        name: Standards rendered
        type: terminal
        terminal_status: success
        position_x: 640
        position_y: 120
      edges:
      - id: e_start_render
        source: start:start
        target: render
      - id: e_render_done
        source: render:success
        target: done
    interface_graph:
      nodes:
      - id: sec_targets
        kind: section
        position_x: 80
        position_y: 80
        width: 480
        height: 180
        data:
          label: Plant devices
          runtime_layout: card
          collapsible: false
      - id: f_targets
        kind: field
        parent_id: sec_targets
        position_x: 40
        position_y: 60
        data:
          label: Plant devices
          field_id: targets
          field_type: inventory.device
          required: false
          description: Globex's plant-floor devices, preselected by default.
          default_value:
          - globex-plant1-core-01
          - globex-plant1-iot-gw-01
          config:
            role: plant_devices
            multiple: true
            option_source:
              kind: inventory.devices
      edges: []
flow_attachments:
- flow: 'Globex: Plant standards check'
  filename: report.sh
  content: "#!/bin/sh\n# SPDX-FileCopyrightText: 2025-2026 Jakub Travnik <jakub.travnik@gmail.com>\n# SPDX-License-Identifier:\
    \ AGPL-3.0-or-later\n#\n# Render an organization's effective network standards into a run artifact.\n# Mounted into the\
    \ container at /attachments and run as-is; all the org-specific\n# values arrive as environment variables the flow resolves\
    \ from {{ vars.* }} and\n# {{ secret(...) }}, so this one script serves the shared, Acme and Globex\n# standards flows\
    \ unchanged.\nset -eu\n\nmkdir -p /artifacts/new\nREPORT=\"/artifacts/new/${REPORT_NAME:-standards}.txt\"\n\n{\n  printf\
    \ 'Effective network standards\\n'\n  printf 'Organization : %s\\n' \"${TENANT_NAME:-unknown}\"\n  printf 'Curated by\
    \   : %s\\n' \"${STANDARDS_OWNER:-Meridian Shared Standards}\"\n  printf '  NTP primary    : %s\\n' \"${NTP_PRIMARY:-<unset>}\"\
    \n  printf '  DNS primary    : %s\\n' \"${DNS_PRIMARY:-<unset>}\"\n  printf '  Syslog primary : %s\\n' \"${SYSLOG_PRIMARY:-<unset>}\"\
    \n  if [ -n \"${APPROVED_CONTAINER_IMAGES:-}\" ]; then\n    printf '  Approved images: %s\\n' \"${APPROVED_CONTAINER_IMAGES}\"\
    \n  fi\n  if [ -n \"${MON_TOKEN:-}\" ]; then\n    printf '  Monitoring token: present (shared, masked)\\n'\n  fi\n} |\
    \ tee \"${REPORT}\"\n"
variables:
- name: TENANT_NAME
  value: Globex Manufacturing
  description: Tenant display name stamped into Globex's own flow output.
notification_destinations:
- name: 'Globex: Plant Ops Email'
  type: email
  enabled: true
  config_json:
    to:
    - plantops@globex.example
    from: hegemony@globex.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
flow_subscriptions:
- flow: 'Globex: Plant standards check'
  destination: 'Globex: Plant Ops Email'
  event: run.completed
  enabled: true
