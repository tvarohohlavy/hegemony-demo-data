- name: 'Ops: Backup lab configs to Git'
  description: Collect running configuration from the selected routers and commit it to a Git repository. Dry run (default)
    commits locally and prints the result; unchecking Dry run pushes to the demo Gitea config-backups repository.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: collect_configs
        name: Collect running configs
        type: step
        kind: CHECK
        phase: PREPARE
        handler: netcli.collect_evidence
        position_x: 320
        position_y: 120
        target_selectors:
        - type: role
          role: backup_targets
        params:
          commands:
          - show running-config
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: package_push
        name: Package and push to Git
        type: step
        kind: EXECUTE
        phase: IMPLEMENTATION
        handler: container.run
        position_x: 640
        position_y: 120
        params:
          image: alpine:3.20
          working_dir: /workspace
          network_mode: host
          timeout_seconds: 180
          env:
            GIT_USER: '{{ secret(''vault://orgs/default/secrets/meridian/gitea/admin/username'') }}'
            GIT_PASS: '{{ secret(''vault://orgs/default/secrets/meridian/gitea/admin/password'') }}'
          command:
          - "set -e\napk add --no-cache git >/dev/null\nWORK=$(mktemp -d)\ncd \"$WORK\"\ngit init -q\ngit config user.email\
            \ \"{{ vars.NOC_CONTACT }}\"\ngit config user.name \"{{ vars.ORG_NAME }} Automation\"\nmkdir -p configs\ncp -ar\
            \ /artifacts/collect_configs/* configs/ 2>/dev/null || true\nCOUNT=$(find configs -type f | wc -l)\nprintf 'Change:\
            \ %s\\nDevices: %s\\nGenerated: %s\\n' \\\n  \"{{ inputs.change_id }}\" \"$COUNT\" \"$(date -u +%FT%TZ)\" > MANIFEST.txt\n\
            git add -A\ngit commit -q -m \"{{ inputs.change_id }}: backup ${COUNT} device config(s)\"\necho \"Committed:\"\
            ; git log --oneline -1\nif [ \"{{ inputs.dry_run }}\" = \"True\" ]; then\n  echo \"DRY RUN - not pushing. Contents:\"\
            \n  git show --stat --oneline HEAD | head -50\nelse\n  git remote add origin \\\n    \"http://${GIT_USER}:${GIT_PASS}@localhost:3000/{{\
            \ vars.GITEA_ORG }}/config-backups.git\"\n  git push -f origin HEAD:main\n  echo \"Pushed to {{ vars.GITEA_URL\
            \ }}/{{ vars.GITEA_ORG }}/config-backups\"\nfi\n"
        policy:
          timeout_sec: 200
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: done
        name: Backup complete
        type: terminal
        terminal_status: success
        position_x: 960
        position_y: 40
      - id: failed
        name: Backup failed
        type: terminal
        terminal_status: failure
        position_x: 960
        position_y: 240
      edges:
      - id: e_start_collect
        source: start:start
        target: collect_configs
      - id: e_collect_package
        source: collect_configs:success
        target: package_push
      - id: e_collect_failed
        source: collect_configs:failure
        target: failed
      - id: e_package_done
        source: package_push:success
        target: done
      - id: e_package_failed
        source: package_push:failure
        target: failed
    outputs:
      git_result:
        type: string
        label: Backup result
        expression: '{{ steps[''package_push''].output.stdout }}'
        description: Output of the packaging/push step (commit line or push confirmation).
    interface_graph:
      nodes:
      - id: sec_targets
        kind: section
        position_x: 80
        position_y: 80
        width: 480
        height: 200
        data:
          label: Target routers
          description: Routers whose running configuration will be backed up.
          runtime_layout: card
          collapsible: false
      - id: f_targets
        kind: field
        parent_id: sec_targets
        position_x: 40
        position_y: 60
        data:
          label: Routers
          field_id: targets
          field_type: inventory.device
          required: true
          description: Devices to back up (pick the lab routers).
          config:
            role: backup_targets
            multiple: true
            option_source:
              kind: inventory.devices
      - id: sec_details
        kind: section
        position_x: 620
        position_y: 80
        width: 480
        height: 240
        data:
          label: Backup details
          runtime_layout: card
          collapsible: false
      - id: f_change_id
        kind: field
        parent_id: sec_details
        position_x: 40
        position_y: 60
        data:
          label: Change reference
          field_id: change_id
          field_type: core.text
          required: true
          default_value: CHG-1001
          description: Change record ID; used in the commit message.
          config:
            validations:
              combinator: AND
              children:
              - id: v_change_id
                op: regex
                operand:
                  kind: value
                  value: ^CHG-[0-9]+$
      - id: f_dry_run
        kind: field
        parent_id: sec_details
        position_x: 40
        position_y: 140
        data:
          label: Dry run
          field_id: dry_run
          field_type: core.bool
          required: false
          default_value: true
          description: Commit locally without pushing. Uncheck to push to Gitea.
          config: {}
      edges: []
- name: 'Ops: Announce service prefix'
  description: Advertise a service loopback prefix on the selected routers after approval. Collects pre-change evidence, applies
    the CLI change, collects post-change evidence and compares the two. The launch form demonstrates number/text/bool/enum
    fields, cross-field templated defaults, input validation, and a conditional (visible_when) field.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 200
      - id: approval
        name: Approve announcement
        type: approval
        phase: IMPLEMENTATION
        position_x: 300
        position_y: 200
        params:
          title: Approve service prefix announcement
          message: Advertise {{ inputs.service_address }} on the selected routers for {{ inputs.change_id }}?
          timeout_seconds: 3600
        policy:
          timeout_sec: 3600
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: precheck
        name: Pre-change evidence
        type: step
        kind: CHECK
        phase: PREPARE
        handler: netcli.collect_evidence
        position_x: 600
        position_y: 120
        target_selectors:
        - type: role
          role: announce_targets
        params:
          commands:
          - show running-config interface lo
          - show ip route ospf
          - show ip ospf neighbor
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: apply
        name: Apply prefix configuration
        type: step
        kind: ACTION
        phase: IMPLEMENTATION
        handler: netcli.execute
        position_x: 900
        position_y: 120
        target_selectors:
        - type: role
          role: announce_targets
        params:
          commands:
          - configure terminal
          - interface lo
          - ip address {{ inputs.service_address }}/32
          - '{% if inputs.advertise %}router ospf{% endif %}'
          - '{% if inputs.advertise %}network {{ inputs.service_address }}/32 area {{ inputs.ospf_area }}{% endif %}'
          - end
          - write memory
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: postcheck
        name: Post-change evidence
        type: step
        kind: CHECK
        phase: VERIFY
        handler: netcli.collect_evidence
        position_x: 1200
        position_y: 120
        target_selectors:
        - type: role
          role: announce_targets
        params:
          commands:
          - show running-config interface lo
          - show ip route ospf
          - show ip ospf neighbor
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: compare
        name: Compare pre/post evidence
        type: step
        kind: CHECK
        phase: VERIFY
        handler: evidence.compare
        position_x: 1500
        position_y: 120
        params:
          precheck_step_id: precheck
          postcheck_step_id: postcheck
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: done
        name: Announcement complete
        type: terminal
        terminal_status: success
        position_x: 1800
        position_y: 40
      - id: failed
        name: Announcement failed
        type: terminal
        terminal_status: failure
        position_x: 1800
        position_y: 360
      edges:
      - id: e_start_approval
        source: start:start
        target: approval
      - id: e_approval_precheck
        source: approval:approved
        target: precheck
      - id: e_approval_rejected
        source: approval:rejected
        target: failed
      - id: e_approval_expired
        source: approval:expired
        target: failed
      - id: e_precheck_apply
        source: precheck:success
        target: apply
      - id: e_precheck_failed
        source: precheck:failure
        target: failed
      - id: e_apply_postcheck
        source: apply:success
        target: postcheck
      - id: e_apply_failed
        source: apply:failure
        target: failed
      - id: e_postcheck_compare
        source: postcheck:success
        target: compare
      - id: e_postcheck_failed
        source: postcheck:failure
        target: failed
      - id: e_compare_done
        source: compare:success
        target: done
      - id: e_compare_failed
        source: compare:failure
        target: failed
    interface_graph:
      nodes:
      - id: sec_targets
        kind: section
        position_x: 80
        position_y: 60
        width: 480
        height: 180
        data:
          label: Target routers
          runtime_layout: card
          collapsible: false
      - id: f_targets
        kind: field
        parent_id: sec_targets
        position_x: 40
        position_y: 60
        data:
          label: Routers
          field_id: targets
          field_type: inventory.device
          required: true
          description: Routers to advertise the service prefix on.
          config:
            role: announce_targets
            multiple: true
            option_source:
              kind: inventory.devices
      - id: sec_prefix
        kind: section
        position_x: 620
        position_y: 60
        width: 520
        height: 220
        data:
          label: Service prefix
          runtime_layout: card
          collapsible: false
      - id: f_loopback_id
        kind: field
        parent_id: sec_prefix
        position_x: 40
        position_y: 60
        data:
          label: Loopback ID
          field_id: loopback_id
          field_type: core.number
          required: true
          default_value: 150
          description: Service loopback index (101-199).
          config:
            subtype: int
            validations:
              combinator: AND
              children:
              - id: v_lo_gt
                op: gt
                operand:
                  kind: value
                  value: 100
              - id: v_lo_lt
                op: lt
                operand:
                  kind: value
                  value: 200
      - id: f_service_address
        kind: field
        parent_id: sec_prefix
        position_x: 300
        position_y: 60
        data:
          label: Service address
          field_id: service_address
          field_type: core.text
          required: true
          default_value: 10.200.{{ inputs.loopback_id }}.1
          description: Host address advertised as a /32 (defaults from the loopback ID).
          config:
            validations:
              combinator: AND
              children:
              - id: v_addr
                op: regex
                operand:
                  kind: value
                  value: ^10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$
      - id: sec_advertise
        kind: section
        position_x: 620
        position_y: 320
        width: 520
        height: 200
        data:
          label: Advertisement
          runtime_layout: fieldset
          collapsible: false
      - id: f_advertise
        kind: field
        parent_id: sec_advertise
        position_x: 40
        position_y: 60
        data:
          label: Advertise into OSPF
          field_id: advertise
          field_type: core.bool
          required: false
          default_value: true
          description: Redistribute the service prefix into OSPF.
          config: {}
      - id: f_ospf_area
        kind: field
        parent_id: sec_advertise
        position_x: 300
        position_y: 60
        data:
          label: OSPF area
          field_id: ospf_area
          field_type: core.text
          required: false
          default_value: '0'
          description: OSPF area to advertise into (shown only when advertising).
          config:
            validations:
              combinator: AND
              children:
              - id: v_area
                op: regex
                operand:
                  kind: value
                  value: ^[0-9.]+$
      - id: sec_change
        kind: section
        position_x: 1200
        position_y: 60
        width: 480
        height: 180
        data:
          label: Change record
          runtime_layout: card
          collapsible: false
      - id: f_change_id
        kind: field
        parent_id: sec_change
        position_x: 40
        position_y: 60
        data:
          label: Change reference
          field_id: change_id
          field_type: core.text
          required: true
          default_value: CHG-1002
          description: Change record ID quoted in the approval prompt.
          config:
            validations:
              combinator: AND
              children:
              - id: v_change_id
                op: regex
                operand:
                  kind: value
                  value: ^CHG-[0-9]+$
      edges:
      - id: e_advertise_area
        source: f_advertise
        target: f_ospf_area
        relations:
        - semantic_type: visible_when
          operator: truthy
          value: null
- name: 'Net: Lab routing health check'
  description: Verify the selected routers are reachable and their OSPF adjacencies are Full. Runs a TCP reachability probe,
    collects OSPF state, and asserts on the neighbor output.
  definition:
    graph:
      nodes:
      - id: start
        name: Start
        type: start
        position_x: 0
        position_y: 120
      - id: reachable
        name: Reachability probe (TCP/22)
        type: step
        kind: CHECK
        phase: PREPARE
        handler: probe.connectivity
        position_x: 300
        position_y: 120
        target_selectors:
        - type: role
          role: health_targets
        params:
          check_type: tcp_connect
          port: 22
          timeout_sec: 10
          attempts: 2
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: neighbors
        name: Collect OSPF state
        type: step
        kind: CHECK
        phase: VERIFY
        handler: netcli.collect_evidence
        position_x: 600
        position_y: 120
        target_selectors:
        - type: role
          role: health_targets
        params:
          commands:
          - show ip ospf neighbor
          - show ip route ospf
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
      - id: assert_full
        name: Assert OSPF neighbors Full
        type: step
        kind: CHECK
        phase: VERIFY
        handler: evidence.assert
        position_x: 900
        position_y: 120
        params:
          artifact_step_id: neighbors
          target_role: health_targets
          command: show ip ospf neighbor
          operator: contains
          expected: Full
          message: OSPF neighbors are not Full on at least one router.
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
      - id: done
        name: Healthy
        type: terminal
        terminal_status: success
        position_x: 1200
        position_y: 40
      - id: failed
        name: Unhealthy
        type: terminal
        terminal_status: failure
        position_x: 1200
        position_y: 240
      edges:
      - id: e_start_reachable
        source: start:start
        target: reachable
      - id: e_reachable_neighbors
        source: reachable:success
        target: neighbors
      - id: e_reachable_failed
        source: reachable:failure
        target: failed
      - id: e_neighbors_assert
        source: neighbors:success
        target: assert_full
      - id: e_neighbors_failed
        source: neighbors:failure
        target: failed
      - id: e_assert_done
        source: assert_full:success
        target: done
      - id: e_assert_failed
        source: assert_full:failure
        target: failed
    interface_graph:
      nodes:
      - id: sec_targets
        kind: section
        position_x: 80
        position_y: 80
        width: 480
        height: 180
        data:
          label: Target routers
          runtime_layout: card
          collapsible: false
      - id: f_targets
        kind: field
        parent_id: sec_targets
        position_x: 40
        position_y: 60
        data:
          label: Routers
          field_id: targets
          field_type: inventory.device
          required: true
          description: Routers to health-check.
          config:
            role: health_targets
            multiple: true
            option_source:
              kind: inventory.devices
      edges: []
flow_attachments:
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: Dockerfile
  content: "# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>\n# SPDX-License-Identifier: AGPL-3.0-or-later\n\
    #\n# FRRouting + OpenSSH lab node. The stock FRR image has no SSH server, so\n# Hegemony's network CLI step handlers (netmiko\
    \ over the device access config)\n# cannot reach it. This image adds sshd and a non-root \"clab\" login whose login\n\
    # SHELL IS vtysh: an SSH session drops straight into FRR's Cisco-IOS-style CLI,\n# so Hegemony's netcli handlers (platform\
    \ ios-xe -> netmiko cisco_ios) drive it\n# exactly like a real switch. clab is a member of the frr/frrvty groups so vtysh\n\
    # can reach the daemon sockets.\n#\n# Built locally by \"Lab: Bootstrap demo datacenter\" and referenced from\n# topology.clab.yml\
    \ as image \"meridian/frr-lab:latest\".\nFROM quay.io/frrouting/frr:9.1.0\n\n# openssh for the SSH channel; shadow for\
    \ chpasswd.\nRUN apk add --no-cache openssh openssh-server shadow \\\n    && ssh-keygen -A \\\n    && sed -i 's/^#\\?PasswordAuthentication.*/PasswordAuthentication\
    \ yes/' /etc/ssh/sshd_config \\\n    && sed -i 's/^#\\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config \\\n\
    \    && adduser -D -s /usr/bin/vtysh clab \\\n    && addgroup clab frr \\\n    && addgroup clab frrvty \\\n    && echo\
    \ \"clab:demo-lab-password\" | chpasswd\n\nCOPY entrypoint.sh /usr/local/bin/lab-entrypoint.sh\nRUN chmod +x /usr/local/bin/lab-entrypoint.sh\n\
    \nENTRYPOINT [\"/usr/local/bin/lab-entrypoint.sh\"]\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: entrypoint.sh
  content: '#!/bin/sh

    # SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>

    # SPDX-License-Identifier: AGPL-3.0-or-later

    #

    # Start the SSH server, then hand off to FRR''s normal container entrypoint so

    # zebra/ospfd come up exactly as in the stock image.

    set -e

    /usr/sbin/sshd

    exec /sbin/tini -- /usr/lib/frr/docker-start

    '
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: topology.clab.yml
  content: "# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>\n# SPDX-License-Identifier: AGPL-3.0-or-later\n\
    #\n# Four FRR routers in a full mesh (6 point-to-point links), each with a static\n# management address on a fixed subnet\
    \ so the seeded Git inventory can target\n# them by mgmt_host. The __HEGEMONY_CLAB_*__ placeholders are substituted by\n\
    # the Bootstrap flow at deploy time (see the flow's deploy step) so the bind\n# sources resolve identically inside the\
    \ orchestrator container and on the host\n# Docker daemon that actually creates the router containers.\nname: __HEGEMONY_CLAB_NAME__\n\
    \nmgmt:\n  network: meridian-lab-mgmt\n  ipv4-subnet: 172.20.30.0/24\n\ntopology:\n  kinds:\n    linux:\n      image:\
    \ meridian/frr-lab:latest\n      # Shared FRR daemons file (zebra + ospfd); per-router frr.conf is bound\n      # per\
    \ node below.\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/daemons:/etc/frr/daemons\n        - __HEGEMONY_CLAB_WORKDIR__/frr/vtysh.conf:/etc/frr/vtysh.conf\n\
    \  nodes:\n    r1:\n      kind: linux\n      mgmt-ipv4: 172.20.30.11\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r1.conf:/etc/frr/frr.conf\n\
    \    r2:\n      kind: linux\n      mgmt-ipv4: 172.20.30.12\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r2.conf:/etc/frr/frr.conf\n\
    \    r3:\n      kind: linux\n      mgmt-ipv4: 172.20.30.13\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r3.conf:/etc/frr/frr.conf\n\
    \    r4:\n      kind: linux\n      mgmt-ipv4: 172.20.30.14\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r4.conf:/etc/frr/frr.conf\n\
    \  links:\n    - endpoints: [\"r1:eth1\", \"r2:eth1\"]   # 10.0.12.0/30\n    - endpoints: [\"r1:eth2\", \"r3:eth1\"] \
    \  # 10.0.13.0/30\n    - endpoints: [\"r1:eth3\", \"r4:eth1\"]   # 10.0.14.0/30\n    - endpoints: [\"r2:eth2\", \"r3:eth2\"\
    ]   # 10.0.23.0/30\n    - endpoints: [\"r2:eth3\", \"r4:eth2\"]   # 10.0.24.0/30\n    - endpoints: [\"r3:eth3\", \"r4:eth3\"\
    ]   # 10.0.34.0/30\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/daemons
  content: '# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>

    # SPDX-License-Identifier: AGPL-3.0-or-later

    # Only zebra (forwarding) and ospfd (the demo routing protocol) are enabled.

    zebra=yes

    bgpd=no

    ospfd=yes

    ospf6d=no

    ripd=no

    ripngd=no

    isisd=no

    pimd=no

    ldpd=no

    nhrpd=no

    eigrpd=no

    babeld=no

    sharpd=no

    pbrd=no

    bfdd=no

    fabricd=no

    vrrpd=no


    vtysh_enable=yes

    zebra_options="  -A 127.0.0.1 -s 90000000"

    bgpd_options="   -A 127.0.0.1"

    ospfd_options="  -A 127.0.0.1"

    ospf6d_options=" -A ::1"

    ripd_options="   -A 127.0.0.1"

    ripngd_options=" -A ::1"

    isisd_options="  -A 127.0.0.1"

    pimd_options="   -A 127.0.0.1"

    ldpd_options="   -A 127.0.0.1"

    nhrpd_options="  -A 127.0.0.1"

    eigrpd_options=" -A 127.0.0.1"

    babeld_options=" -A 127.0.0.1"

    sharpd_options=" -A 127.0.0.1"

    pbrd_options="   -A 127.0.0.1"

    staticd_options="-A 127.0.0.1"

    bfdd_options="   -A 127.0.0.1"

    fabricd_options="-A 127.0.0.1"

    vrrpd_options="  -A 127.0.0.1"

    '
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/vtysh.conf
  content: 'service integrated-vtysh-config

    '
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/r1.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname lab-r1\nservice integrated-vtysh-config\n!\ninterface lo\n\
    \ ip address 10.255.255.1/32\n!\ninterface eth1\n description to-lab-r2\n ip address 10.0.12.1/30\n!\ninterface eth2\n\
    \ description to-lab-r3\n ip address 10.0.13.1/30\n!\ninterface eth3\n description to-lab-r4\n ip address 10.0.14.1/30\n\
    !\nrouter ospf\n ospf router-id 10.255.255.1\n network 10.0.12.0/30 area 0\n network 10.0.13.0/30 area 0\n network 10.0.14.0/30\
    \ area 0\n network 10.255.255.1/32 area 0\n!\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/r2.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname lab-r2\nservice integrated-vtysh-config\n!\ninterface lo\n\
    \ ip address 10.255.255.2/32\n!\ninterface eth1\n description to-lab-r1\n ip address 10.0.12.2/30\n!\ninterface eth2\n\
    \ description to-lab-r3\n ip address 10.0.23.1/30\n!\ninterface eth3\n description to-lab-r4\n ip address 10.0.24.1/30\n\
    !\nrouter ospf\n ospf router-id 10.255.255.2\n network 10.0.12.0/30 area 0\n network 10.0.23.0/30 area 0\n network 10.0.24.0/30\
    \ area 0\n network 10.255.255.2/32 area 0\n!\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/r3.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname lab-r3\nservice integrated-vtysh-config\n!\ninterface lo\n\
    \ ip address 10.255.255.3/32\n!\ninterface eth1\n description to-lab-r1\n ip address 10.0.13.2/30\n!\ninterface eth2\n\
    \ description to-lab-r2\n ip address 10.0.23.2/30\n!\ninterface eth3\n description to-lab-r4\n ip address 10.0.34.1/30\n\
    !\nrouter ospf\n ospf router-id 10.255.255.3\n network 10.0.13.0/30 area 0\n network 10.0.23.0/30 area 0\n network 10.0.34.0/30\
    \ area 0\n network 10.255.255.3/32 area 0\n!\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: frr/r4.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname lab-r4\nservice integrated-vtysh-config\n!\ninterface lo\n\
    \ ip address 10.255.255.4/32\n!\ninterface eth1\n description to-lab-r1\n ip address 10.0.14.2/30\n!\ninterface eth2\n\
    \ description to-lab-r2\n ip address 10.0.24.2/30\n!\ninterface eth3\n description to-lab-r3\n ip address 10.0.34.2/30\n\
    !\nrouter ospf\n ospf router-id 10.255.255.4\n network 10.0.14.0/30 area 0\n network 10.0.24.0/30 area 0\n network 10.0.34.0/30\
    \ area 0\n network 10.255.255.4/32 area 0\n!\n"
- flow: 'Lab: Provision and tear down demo datacenter'
  filename: seed.sh
  content: "#!/bin/sh\n# SPDX-FileCopyrightText: 2025-2026 Jakub Trávník <jakub.travnik@gmail.com>\n# SPDX-License-Identifier:\
    \ AGPL-3.0-or-later\n#\n# Provision the demo Gitea so the config-backup flow has somewhere to push:\n# wait for health,\
    \ create the admin account, then create a public org and an\n# auto-initialised config-backups repository. Idempotent\
    \ — safe to re-run.\nset -e\n\nGITEA_CONTAINER=\"${GITEA_CONTAINER:-meridian-gitea}\"\nBASE=\"${GITEA_URL:-http://host.docker.internal:3000}\"\
    \nADMIN_USER=\"${ADMIN_USER:-meridian-admin}\"\nADMIN_PASSWORD=\"${ADMIN_PASSWORD:-demo-gitea-admin-password}\"\nORG=\"\
    ${GITEA_ORG:-meridian}\"\n\necho \"Waiting for Gitea at ${BASE} ...\"\nfor _ in $(seq 1 60); do\n  if curl -fsS \"${BASE}/api/healthz\"\
    \ >/dev/null 2>&1; then\n    echo \"Gitea is healthy.\"\n    break\n  fi\n  sleep 2\ndone\n\necho \"Creating admin user\
    \ ${ADMIN_USER} (idempotent) ...\"\ndocker exec \"${GITEA_CONTAINER}\" gitea admin user create \\\n  --username \"${ADMIN_USER}\"\
    \ \\\n  --password \"${ADMIN_PASSWORD}\" \\\n  --email \"${ADMIN_USER}@meridian.example\" \\\n  --admin --must-change-password=false\
    \ \\\n  || echo \"admin user already exists; continuing\"\n\necho \"Creating public org ${ORG} (idempotent) ...\"\ncurl\
    \ -fsS -u \"${ADMIN_USER}:${ADMIN_PASSWORD}\" -X POST \"${BASE}/api/v1/orgs\" \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d \"{\\\"username\\\":\\\"${ORG}\\\",\\\"visibility\\\":\\\"public\\\"}\" \\\n  || echo \"org already exists;\
    \ continuing\"\n\necho \"Creating config-backups repository (idempotent) ...\"\ncurl -fsS -u \"${ADMIN_USER}:${ADMIN_PASSWORD}\"\
    \ -X POST \"${BASE}/api/v1/orgs/${ORG}/repos\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"name\":\"config-backups\"\
    ,\"private\":false,\"auto_init\":true,\"default_branch\":\"main\"}' \\\n  || echo \"repository already exists; continuing\"\
    \n\necho \"Gitea seeded: ${BASE}/${ORG}/config-backups\"\n"
variables:
- name: ORG_NAME
  value: Meridian Networks
  description: Fictional operator name surfaced in flow output and notifications.
- name: NOC_CONTACT
  value: noc@meridian.example
  description: Network Operations Center contact address for change records.
- name: MAINT_WINDOW
  value: Sun 02:00-04:00 UTC
  description: Standard maintenance window quoted by change-oriented flows.
- name: CHANGE_PREFIX
  value: CHG
  description: Prefix for change identifiers; form fields validate against it.
- name: GITEA_HOST
  value: localhost
  description: Host that publishes the demo Gitea service. The flows that reach Gitea run as host-networked containers, so
    localhost:3000 addresses it directly.
- name: GITEA_PORT
  value: '3000'
  description: Published port of the demo Gitea service.
- name: GITEA_ORG
  value: meridian
  description: Gitea organisation that owns the source-of-truth and backup repos.
- name: GITEA_URL
  value: http://{{ vars.GITEA_HOST }}:{{ vars.GITEA_PORT }}
  description: Base URL of the demo Gitea service (composed from GITEA_HOST/PORT).
- name: LAB_MGMT_SUBNET
  value: 172.20.30.0/24
  description: Management subnet containerlab assigns to the FRR lab routers.
- name: LAB_IMAGE
  value: meridian/frr-lab:latest
  description: Locally built FRR + sshd image tag used by the lab topology.
- name: NTP_PRIMARY
  value: 192.0.2.123
  description: Primary NTP server pushed into rendered device configuration.
- name: DNS_PRIMARY
  value: 192.0.2.53
  description: Primary DNS resolver pushed into rendered device configuration.
- name: SYSLOG_PRIMARY
  value: 192.0.2.54
  description: Primary syslog collector referenced by health and backup flows.
notification_destinations:
- name: Meridian NOC Email
  type: email
  enabled: true
  config_json:
    to:
    - noc@meridian.example
    from: hegemony@meridian.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
- name: Meridian Security Email
  type: email
  enabled: true
  config_json:
    to:
    - security@meridian.example
    from: hegemony@meridian.example
    smtp_host_ref: '{{ env(''HEGEMONY_DEMO_SMTP_HOST'', ''demo-notification-smtp'') }}'
    smtp_port_ref: '{{ env(''HEGEMONY_DEMO_SMTP_PORT'', ''1025'') }}'
    smtp_use_tls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_TLS'', ''false'') }}'
    smtp_use_starttls_ref: '{{ env(''HEGEMONY_DEMO_SMTP_USE_STARTTLS'', ''false'') }}'
- name: Meridian Discord
  type: discord
  enabled: true
  config_json:
    token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/discord_token'') }}'
    webhook_id: '123456789012345678'
- name: Meridian Slack
  type: slack
  enabled: true
  config_json:
    token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/slack_token'') }}'
    botname: Meridian
- name: Meridian Telegram
  type: telegram
  enabled: true
  config_json:
    token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/telegram_token'') }}'
    chats: '123456789'
- name: Meridian Teams
  type: teams_power_automate
  enabled: true
  config_json:
    url: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/teams_url'') }}'
- name: Meridian Webex
  type: webex_incoming_webhook
  enabled: true
  config_json:
    webhook_token: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/webex_token'') }}'
- name: Meridian Ntfy
  type: shoutrrr
  enabled: true
  config_json:
    url_secret: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/notify/ntfy_url'') }}'
    title: Meridian Networks Demo
- name: 'Meridian Webhook: Signed HMAC'
  type: outgoing_webhook
  enabled: true
  config_json:
    url: https://meridian-notify.invalid/webhooks/signed
    method: POST
    headers:
      X-Meridian-Receiver: synthetic-signed
    timeout_seconds: 5
    retry_count: 0
    verify_tls: true
    auth_type: none
    signing:
      algorithm: hmac-sha256
      secret_ref: '{{ secret(''vault://orgs/default/secrets/meridian/integrations/webhook/signing_secret'') }}'
      signature_header: X-Meridian-Signature
      timestamp_header: X-Meridian-Timestamp
      signed_content: timestamp_dot_body
      prefix: sha256=
schedules:
- name: Nightly config backup (demo)
  flow: 'Ops: Backup lab configs to Git'
  schedule_type: recurring
  cron_expression: 0 2 * * *
  timezone: UTC
  params:
    change_id: CHG-NIGHTLY
    dry_run: true
  enabled: true
- name: Weekly routing health check (demo)
  flow: 'Net: Lab routing health check'
  schedule_type: recurring
  cron_expression: 0 6 * * 1
  timezone: UTC
  params: {}
  enabled: true
- name: Hourly reachability sweep (demo)
  flow: 'Net: Lab routing health check'
  schedule_type: recurring
  interval_seconds: 3600
  timezone: UTC
  params: {}
  enabled: true
- name: Monthly announcement rehearsal (demo)
  flow: 'Ops: Announce service prefix'
  schedule_type: recurring
  cron_expression: 0 9 1 * *
  timezone: UTC
  params:
    loopback_id: 150
    service_address: 10.200.150.1
    advertise: true
    ospf_area: '0'
    change_id: CHG-REHEARSAL
  enabled: false
- name: Planned maintenance rehearsal (demo)
  flow: 'Net: Lab routing health check'
  schedule_type: one_time
  run_at: '2029-05-16T02:00:00+00:00'
  timezone: UTC
  params: {}
  enabled: true
webhooks:
- name: 'Meridian Webhook: GitOps drift detected'
  description: Synthetic GitOps drift event that triggers a configuration backup.
  flows:
  - 'Ops: Backup lab configs to Git'
  auth_mode: bearer
  replay_window_seconds: 0
  rate_limit_per_minute: 20
  allowed_source_ips:
  - 203.0.113.0/24
  payload_mapping:
    run_name: $.repository.full_name
    params:
      change_id: $.change.id
      source: gitops
  enabled: true
- name: 'Meridian Webhook: Monitoring alarm'
  description: Synthetic monitoring alarm that triggers a routing health check.
  flows:
  - 'Net: Lab routing health check'
  auth_mode: hmac_sha256
  replay_window_seconds: 300
  rate_limit_per_minute: 60
  allowed_source_ips:
  - 192.0.2.0/24
  payload_mapping:
    run_name: $.alarm.name
    params:
      alarm: $.alarm.name
      severity: $.alarm.severity
      source: monitoring
  enabled: true
- name: 'Meridian Webhook: ITSM change window'
  description: Synthetic ITSM change-window event that triggers a service prefix announcement.
  flows:
  - 'Ops: Announce service prefix'
  auth_mode: hmac_sha256
  replay_window_seconds: 600
  rate_limit_per_minute: 15
  allowed_source_ips:
  - 192.0.2.0/24
  - 198.51.100.0/24
  payload_mapping:
    run_name: $.number
    params:
      change_id: $.number
      service_address: $.change.service_address
      source: itsm
  enabled: true
flow_subscriptions:
- flow: 'Ops: Backup lab configs to Git'
  destination: Meridian NOC Email
  event: run.completed
  enabled: true
- flow: 'Ops: Backup lab configs to Git'
  destination: Meridian NOC Email
  event: run.failed
  enabled: true
- flow: 'Ops: Announce service prefix'
  destination: Meridian NOC Email
  event: approval.requested
  enabled: true
- flow: 'Ops: Announce service prefix'
  destination: Meridian NOC Email
  event: run.completed
  enabled: true
- flow: 'Ops: Announce service prefix'
  destination: Meridian Slack
  event: run.completed
  enabled: false
- flow: 'Net: Lab routing health check'
  destination: Meridian Security Email
  event: run.failed
  enabled: true
- flow: 'Net: Lab routing health check'
  destination: 'Meridian Webhook: Signed HMAC'
  event: run.failed
  enabled: false
- flow: 'Lab: Provision and tear down demo datacenter'
  destination: Meridian NOC Email
  event: approval.requested
  enabled: true
