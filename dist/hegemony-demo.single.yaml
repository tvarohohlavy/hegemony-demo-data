flows:
- name: 'Demo: parallel site readiness'
  description: Demonstrates a change-readiness workflow with fork/join parallelism, tag-based target selectors, and a containerized
    plan-render step.
  definition:
    graph:
      edges:
      - id: e_start_intake
        source: start:start
        target: intake
      - id: e_intake_fork
        source: intake:success
        target: fan_out
      - id: e_fork_core
        source: fan_out:fork
        target: core_precheck
      - id: e_fork_edge
        source: fan_out:fork
        target: edge_precheck
      - id: e_fork_render
        source: fan_out:fork
        target: render_plan
      - id: e_core_join
        source: core_precheck:success
        target: readiness_join
      - id: e_edge_join
        source: edge_precheck:success
        target: readiness_join
      - id: e_render_join
        source: render_plan:success
        target: readiness_join
      - id: e_join_summary
        source: readiness_join:joined
        target: summarize
      - id: e_join_failed
        source: readiness_join:join_failed
        target: failed
      - id: e_summary_done
        source: summarize:success
        target: done
      nodes:
      - id: done
        name: Ready
        position_x: 2200
        position_y: 160
        terminal_status: success
        type: terminal
      - handler: noop
        id: intake
        kind: ACTION
        name: Intake change request
        phase: PREPARE
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 360
        position_y: 160
      - id: fan_out
        name: Parallel readiness checks
        position_x: 720
        position_y: 160
        type: fork
      - handler: noop
        id: core_precheck
        kind: CHECK
        name: Core pre-checks
        phase: PREPARE
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1080
        position_y: -160
        target_selectors:
        - type: role
          role: core
      - handler: noop
        id: edge_precheck
        kind: CHECK
        name: Edge pre-checks
        phase: PREPARE
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1080
        position_y: 160
        target_selectors:
        - type: role
          role: edge
      - params:
          command:
          - 'echo "Hegemony demo container: rendering readiness plan"'
          - test -f change-plan.json && cat change-plan.json
          - printf "plan_status=ready change_id=%s\n" "$CHANGE_ID"
          cpus: '0.25'
          env:
            CHANGE_ID: '{{ vars.DEMO_CHANGE_ID }}'
            RUN_LABEL: '{{ vars.DEMO_RUN_LABEL }}'
            ENV: '{{ vars.DEMO_ENV }}'
            PREPARE_MESSAGE: '{{ vars.DEMO_PREPARE_MESSAGE }}'
          image: alpine:3.20
          memory: 128m
          timeout_seconds: 60
          working_dir: /workspace
        handler: actions.run_container
        id: render_plan
        kind: EXECUTE
        mounted_files:
        - change-plan.json
        name: Render plan in container
        phase: PREPARE
        policy:
          timeout_sec: 90
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
        position_x: 1080
        position_y: 480
      - cancel_policy: wait
        failure_policy: propagate
        id: readiness_join
        join_mode: all
        name: Readiness gate
        position_x: 1480
        position_y: 160
        type: join
      - handler: noop
        id: summarize
        kind: ACTION
        name: Summarize readiness
        phase: VERIFY
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1840
        position_y: 160
      - id: failed
        name: Readiness failed
        position_x: 2200
        position_y: 480
        terminal_status: failure
        type: terminal
      - id: start
        name: Start
        position_x: 0
        position_y: 160
        type: start
- name: 'Demo: staged branch rollout'
  description: Demonstrates a staged rollout fan-out across device roles with parallel per-role stages and an all-branches
    join before verification.
  definition:
    graph:
      edges:
      - id: e_start_prepare
        source: start:start
        target: prepare
      - id: e_prepare_stages
        source: prepare:success
        target: stage_fork
      - id: e_stage_core
        source: stage_fork:fork
        target: rollout_core
      - id: e_stage_edge
        source: stage_fork:fork
        target: rollout_edge
      - id: e_stage_access
        source: stage_fork:fork
        target: rollout_access
      - id: e_core_join
        source: rollout_core:success
        target: stage_join
      - id: e_edge_join
        source: rollout_edge:success
        target: stage_join
      - id: e_access_join
        source: rollout_access:success
        target: stage_join
      - id: e_join_verify
        source: stage_join:joined
        target: verify
      - id: e_join_failed
        source: stage_join:join_failed
        target: failed
      - id: e_verify_done
        source: verify:success
        target: done
      nodes:
      - id: done
        name: Rollout complete
        position_x: 2200
        position_y: 180
        terminal_status: success
        type: terminal
      - handler: noop
        id: prepare
        kind: ACTION
        name: Prepare staged rollout
        phase: PREPARE
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 360
        position_y: 180
      - id: stage_fork
        name: Fan out by role
        position_x: 720
        position_y: 180
        type: fork
      - params:
          message: '{{ vars.DEMO_SLEEP_MESSAGE }} — core stage for {{ vars.DEMO_REGION_PRIMARY }}'
          seconds: 1
        handler: actions.sleep
        id: rollout_core
        kind: ACTION
        name: Core stage
        phase: IMPLEMENTATION
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1080
        position_y: -180
        target_selectors:
        - type: role
          role: core
      - params:
          message: Roll out edge stage for {{ vars.DEMO_REGION_PRIMARY }}
          seconds: 1
        handler: actions.sleep
        id: rollout_edge
        kind: ACTION
        name: Edge stage
        phase: IMPLEMENTATION
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1080
        position_y: 180
        target_selectors:
        - type: role
          role: edge
      - params:
          message: Roll out access stage for {{ vars.DEMO_REGION_BRANCH }}
          seconds: 1
        handler: actions.sleep
        id: rollout_access
        kind: ACTION
        name: Access stage
        phase: IMPLEMENTATION
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1080
        position_y: 540
        target_selectors:
        - type: role
          role: access
      - cancel_policy: wait
        failure_policy: propagate
        id: stage_join
        join_mode: all
        name: Stage join
        position_x: 1480
        position_y: 180
        type: join
      - params:
          message: '{{ vars.DEMO_VERIFY_MESSAGE }}'
        handler: noop
        id: verify
        kind: CHECK
        name: Verify rollout summary
        phase: VERIFY
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1840
        position_y: 180
      - id: failed
        name: Rollout failed
        position_x: 2200
        position_y: 540
        terminal_status: failure
        type: terminal
      - id: start
        name: Start
        position_x: 0
        position_y: 180
        type: start
- name: 'Demo: containerized config render'
  description: Demonstrates using a flow attachment as container input, rendering candidate configuration in an isolated container,
    then validating the output.
  definition:
    graph:
      edges:
      - id: e_start_collect
        source: start:start
        target: collect_context
      - id: e_collect_render
        source: collect_context:success
        target: render_candidate
      - id: e_render_validate
        source: render_candidate:success
        target: validate_candidate
      - id: e_validate_done
        source: validate_candidate:success
        target: done
      nodes:
      - id: done
        name: Candidate ready
        position_x: 1580
        position_y: 120
        terminal_status: success
        type: terminal
      - handler: noop
        id: collect_context
        kind: ACTION
        name: Collect render context
        phase: PREPARE
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 380
        position_y: 120
      - params:
          command:
          - 'echo "Hegemony demo container: rendering interface template"'
          - cat templates/interface.j2
          - printf "rendered_for=%s region=%s\n" "$CHANGE_ID" "$REGION"
          cpus: '0.25'
          env:
            CHANGE_ID: '{{ vars.DEMO_CHANGE_ID }}'
            REGION: '{{ vars.DEMO_REGION_PRIMARY }}'
          image: alpine:3.20
          memory: 128m
          timeout_seconds: 60
          working_dir: /workspace
        handler: actions.run_container
        id: render_candidate
        kind: EXECUTE
        mounted_files:
        - templates/
        name: Render candidate config
        phase: IMPLEMENTATION
        policy:
          timeout_sec: 90
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
        position_x: 780
        position_y: 120
      - handler: noop
        id: validate_candidate
        kind: CHECK
        name: Validate candidate
        phase: VERIFY
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1180
        position_y: 120
      - id: start
        name: Start
        position_x: 0
        position_y: 120
        type: start
- name: 'Demo: containerlab parallel lab'
  description: Spins up a 4-router (FRRouting) full-mesh containerlab topology in one branch and runs an interaction sub-flow
    in parallel. Branch A deploys the lab, holds it alive briefly, then destroys it cleanly. Branch B first waits for FRR's
    `vtysh` to respond on all 4 routers (the definitive readiness signal), then runs an interactive probe (docker exec into
    each router) showing OSPF neighbors and routes via `vtysh` (Cisco-IOS-style CLI). Requires the `containerlab` image and
    the public `quay.io/frrouting/frr` image. FRR is light (~30 MB RAM per node) and boots in seconds, so the demo runs end-to-end
    in well under a minute of useful time.
  definition:
    graph:
      edges:
      - id: e_start_prepare
        source: start:start
        target: prepare
      - id: e_prepare_fork
        source: prepare:success
        target: lab_fork
      - id: e_fork_deploy
        source: lab_fork:fork
        target: deploy_lab
      - id: e_fork_wait_delay
        source: lab_fork:fork
        target: wait_boot_delay
      - id: e_wait_delay_wait
        source: wait_boot_delay:success
        target: wait_reachable
      - id: e_deploy_hold
        source: deploy_lab:success
        target: hold_lab
      - id: e_hold_destroy
        source: hold_lab:success
        target: destroy_lab
      - id: e_destroy_join
        source: destroy_lab:success
        target: lab_join
      - id: e_wait_interact
        source: wait_reachable:success
        target: interact_routers
      - id: e_interact_join
        source: interact_routers:success
        target: lab_join
      - id: e_deploy_fail_destroy
        source: deploy_lab:failure
        target: destroy_lab
      - id: e_destroy_fail_join
        source: destroy_lab:failure
        target: lab_join
      - id: e_wait_delay_fail_join
        source: wait_boot_delay:failure
        target: lab_join
      - id: e_wait_fail_join
        source: wait_reachable:failure
        target: lab_join
      - id: e_interact_fail_join
        source: interact_routers:failure
        target: lab_join
      - id: e_join_done
        source: lab_join:joined
        target: done
      - id: e_join_failed
        source: lab_join:join_failed
        target: failed
      nodes:
      - id: start
        name: Start
        position_x: 0
        position_y: 180
        type: start
      - handler: noop
        id: prepare
        kind: ACTION
        name: Prepare lab demo
        phase: PREPARE
        policy:
          timeout_sec: 30
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 360
        position_y: 180
      - id: lab_fork
        name: Fan out (lab + interaction)
        position_x: 720
        position_y: 180
        type: fork
      - params:
          command:
          - "set -e\nLAB_ID=\"$(printf '%s' \"{{ run_id }}\" | tr -c 'A-Za-z0-9_.-' '-')\"\nLAB_NAME=\"hegemony-demo-${LAB_ID}\"\
            \nWORKDIR=\"/tmp/hegemony-clab-${LAB_ID}\"\nTOPOLOGY=\"${WORKDIR}/topology.run.clab.yml\"\nsed \\\n  -e \"s#__HEGEMONY_CLAB_NAME__#${LAB_NAME}#g\"\
            \ \\\n  -e \"s#__HEGEMONY_CLAB_WORKDIR__#${WORKDIR}#g\" \\\n  topology.clab.yml > \"${TOPOLOGY}\"\ncontainerlab\
            \ deploy -t \"${TOPOLOGY}\"\n"
          cpus: '1.0'
          image: ghcr.io/srl-labs/clab:0.77.0
          memory: 1g
          network_mode: host
          attach_docker_socket: true
          privileged: true
          pid_mode: host
          extra_mounts:
          - /var/run/netns:/var/run/netns:shared
          - /var/lib/docker:/var/lib/docker
          - /tmp/hegemony-clab-{{ run_id }}:/tmp/hegemony-clab-{{ run_id }}
          timeout_seconds: 600
          working_dir: /tmp/hegemony-clab-{{ run_id }}
        handler: actions.run_container
        id: deploy_lab
        kind: EXECUTE
        mounted_files:
        - topology.clab.yml
        - frr/
        name: Deploy lab (4-router full mesh)
        phase: IMPLEMENTATION
        policy:
          timeout_sec: 660
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
        position_x: 1080
        position_y: -100
      - params:
          seconds: 60
          message: Holding lab alive briefly while branch B waits for NOS boot + interacts
        handler: actions.sleep
        id: hold_lab
        kind: ACTION
        name: Hold lab alive (60s)
        phase: IMPLEMENTATION
        policy:
          timeout_sec: 90
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1440
        position_y: -100
      - params:
          command:
          - "set -e\nLAB_ID=\"$(printf '%s' \"{{ run_id }}\" | tr -c 'A-Za-z0-9_.-' '-')\"\nLAB_NAME=\"hegemony-demo-${LAB_ID}\"\
            \nWORKDIR=\"/tmp/hegemony-clab-${LAB_ID}\"\nTOPOLOGY=\"${WORKDIR}/topology.run.clab.yml\"\nif [ ! -f \"${TOPOLOGY}\"\
            \ ]; then\n  sed \\\n    -e \"s#__HEGEMONY_CLAB_NAME__#${LAB_NAME}#g\" \\\n    -e \"s#__HEGEMONY_CLAB_WORKDIR__#${WORKDIR}#g\"\
            \ \\\n    topology.clab.yml > \"${TOPOLOGY}\"\nfi\ncontainerlab destroy -t \"${TOPOLOGY}\" --cleanup\nrm -rf \"\
            ${WORKDIR}\"\n"
          cpus: '1.0'
          image: ghcr.io/srl-labs/clab:0.77.0
          memory: 1g
          network_mode: host
          attach_docker_socket: true
          privileged: true
          pid_mode: host
          extra_mounts:
          - /var/run/netns:/var/run/netns:shared
          - /var/lib/docker:/var/lib/docker
          - /tmp/hegemony-clab-{{ run_id }}:/tmp/hegemony-clab-{{ run_id }}
          timeout_seconds: 300
          working_dir: /tmp/hegemony-clab-{{ run_id }}
        handler: actions.run_container
        id: destroy_lab
        kind: EXECUTE
        mounted_files:
        - topology.clab.yml
        - frr/
        name: Destroy lab
        phase: VERIFY
        policy:
          timeout_sec: 300
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
        position_x: 1800
        position_y: -100
      - params:
          seconds: 10
          message: Giving containerlab time to create router containers before probing FRR readiness
        handler: actions.sleep
        id: wait_boot_delay
        kind: ACTION
        name: Wait for containers to exist (10s)
        phase: VERIFY
        policy:
          timeout_sec: 60
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: false
        position_x: 1080
        position_y: 400
      - params:
          command:
          - echo "Waiting for FRR vtysh to respond on r1..r4..."
          - "for r in r1 r2 r3 r4; do\n  LAB_ID=\"$(printf '%s' \"{{ run_id }}\" | tr -c 'A-Za-z0-9_.-' '-')\"\n  LAB_NAME=\"\
            hegemony-demo-${LAB_ID}\"\n  CONTAINER=\"clab-${LAB_NAME}-$r\"\n  echo \"--- waiting for ${CONTAINER} ---\"\n\
            \  for i in $(seq 1 20); do\n    if docker exec \"${CONTAINER}\" vtysh -c 'show version' >/dev/null 2>&1; then\n\
            \      echo \"ready: $r (after ${i} attempt(s))\"\n      break\n    fi\n    sleep 2\n    if [ \"$i\" = \"20\"\
            \ ]; then\n      echo \"TIMEOUT waiting for $r vtysh\" >&2\n      exit 1\n    fi\n  done\ndone\n"
          - echo "All 4 FRR routers are responding to vtysh."
          cpus: '0.25'
          image: ghcr.io/srl-labs/clab:0.77.0
          memory: 128m
          attach_docker_socket: true
          timeout_seconds: 90
          working_dir: /workspace
        handler: actions.run_container
        id: wait_reachable
        kind: CHECK
        mounted_files: []
        name: Wait for FRR vtysh ready
        phase: VERIFY
        policy:
          timeout_sec: 120
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
        position_x: 1440
        position_y: 400
      - params:
          command:
          - echo "=== Inspecting clab topology ==="
          - 'LAB_ID="$(printf ''%s'' "{{ run_id }}" | tr -c ''A-Za-z0-9_.-'' ''-'')"

            LAB_NAME="hegemony-demo-${LAB_ID}"

            WORKDIR="/tmp/hegemony-clab-${LAB_ID}"

            TOPOLOGY="${WORKDIR}/topology.run.clab.yml"

            containerlab inspect -t "${TOPOLOGY}" || true

            '
          - "LAB_ID=\"$(printf '%s' \"{{ run_id }}\" | tr -c 'A-Za-z0-9_.-' '-')\"\nLAB_NAME=\"hegemony-demo-${LAB_ID}\"\n\
            for r in r1 r2 r3 r4; do\n  echo \"=== $r: OSPF neighbors ===\"\n  docker exec \"clab-${LAB_NAME}-$r\" vtysh -c\
            \ 'show ip ospf neighbor' || true\ndone\n"
          - "LAB_ID=\"$(printf '%s' \"{{ run_id }}\" | tr -c 'A-Za-z0-9_.-' '-')\"\nLAB_NAME=\"hegemony-demo-${LAB_ID}\"\n\
            for r in r1 r2 r3 r4; do\n  echo \"=== $r: routes learned via OSPF ===\"\n  docker exec \"clab-${LAB_NAME}-$r\"\
            \ vtysh -c 'show ip route ospf' || true\ndone\n"
          - 'echo "=== Cross-mesh ping: r1 → r4 loopback (10.255.255.4) ==="'
          - 'LAB_ID="$(printf ''%s'' "{{ run_id }}" | tr -c ''A-Za-z0-9_.-'' ''-'')"

            LAB_NAME="hegemony-demo-${LAB_ID}"

            docker exec "clab-${LAB_NAME}-r1" ping -c 3 -W 2 10.255.255.4 || true

            '
          - echo "Interaction complete"
          cpus: '0.5'
          image: ghcr.io/srl-labs/clab:0.77.0
          memory: 256m
          attach_docker_socket: true
          extra_mounts:
          - /tmp/hegemony-clab-{{ run_id }}:/tmp/hegemony-clab-{{ run_id }}
          timeout_seconds: 180
          working_dir: /tmp/hegemony-clab-{{ run_id }}
        handler: actions.run_container
        id: interact_routers
        kind: EXECUTE
        mounted_files:
        - topology.clab.yml
        name: Interact with routers (vtysh)
        phase: VERIFY
        policy:
          timeout_sec: 240
          retries: 0
          on_failure: FAIL_RUN
          evidence_required: true
        position_x: 1800
        position_y: 400
      - cancel_policy: wait
        failure_policy: propagate
        id: lab_join
        join_mode: all
        name: Lab + interaction join
        position_x: 2160
        position_y: 180
        type: join
      - id: done
        name: Lab demo complete
        position_x: 2520
        position_y: 60
        terminal_status: success
        type: terminal
      - id: failed
        name: Lab demo failed
        position_x: 2520
        position_y: 360
        terminal_status: failure
        type: terminal
flow_attachments:
- flow: 'Demo: parallel site readiness'
  filename: change-plan.json
  content: "{\n  \"change_id\": \"{{ vars.DEMO_CHANGE_ID }}\",\n  \"window\": \"{{ vars.DEMO_MAINTENANCE_WINDOW }}\",\n  \"\
    parallel_branches\": [\"core_precheck\", \"edge_precheck\", \"render_plan\"],\n  \"contact\": \"{{ vars.DEMO_CONTACT }}\"\
    \n}\n"
- flow: 'Demo: containerized config render'
  filename: templates/interface.j2
  content: "interface Loopback100\n description Rendered by Hegemony demo for {{ vars.DEMO_CHANGE_ID }}\n ip address 198.51.100.10\
    \ 255.255.255.255\n!\n"
- flow: 'Demo: containerlab parallel lab'
  filename: topology.clab.yml
  content: "name: __HEGEMONY_CLAB_NAME__\nmgmt:\n  network: __HEGEMONY_CLAB_NAME__\ntopology:\n  kinds:\n    linux:\n    \
    \  image: quay.io/frrouting/frr:9.1.0\n      # Shared FRR daemons enablement file: every router runs zebra\n      # (forwarding\
    \ + interfaces) and ospfd (the routing protocol we\n      # demo). Per-router frr.conf is bound below.\n      #\n    \
    \  # Bind sources reference a per-run host workspace because the orchestrator\n      # mounts that path 1:1 with the host.\
    \ Files in /workspace are only\n      # inside the orchestrator and would fail to mount on host docker.\n      binds:\n\
    \        - __HEGEMONY_CLAB_WORKDIR__/frr/daemons:/etc/frr/daemons\n        - __HEGEMONY_CLAB_WORKDIR__/frr/vtysh.conf:/etc/frr/vtysh.conf\n\
    \      # FRR's containerised entrypoint wraps the daemons under tini.\n      cmd: \"/sbin/tini -- /usr/lib/frr/docker-start\"\
    \n  nodes:\n    r1:\n      kind: linux\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r1.conf:/etc/frr/frr.conf\n\
    \    r2:\n      kind: linux\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r2.conf:/etc/frr/frr.conf\n    r3:\n\
    \      kind: linux\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r3.conf:/etc/frr/frr.conf\n    r4:\n      kind:\
    \ linux\n      binds:\n        - __HEGEMONY_CLAB_WORKDIR__/frr/r4.conf:/etc/frr/frr.conf\n  links:\n    # Full mesh, 6\
    \ point-to-point links between 4 routers.\n    # clab assigns eth1.. ethN inside each container in declaration order.\n\
    \    - endpoints: [\"r1:eth1\", \"r2:eth1\"]   # 10.0.12.0/30\n    - endpoints: [\"r1:eth2\", \"r3:eth1\"]   # 10.0.13.0/30\n\
    \    - endpoints: [\"r1:eth3\", \"r4:eth1\"]   # 10.0.14.0/30\n    - endpoints: [\"r2:eth2\", \"r3:eth2\"]   # 10.0.23.0/30\n\
    \    - endpoints: [\"r2:eth3\", \"r4:eth2\"]   # 10.0.24.0/30\n    - endpoints: [\"r3:eth3\", \"r4:eth3\"]   # 10.0.34.0/30\n"
- flow: 'Demo: containerlab parallel lab'
  filename: frr/daemons
  content: 'zebra=yes

    bgpd=no

    ospfd=yes

    ospf6d=no

    ripd=no

    ripngd=no

    isisd=no

    pimd=no

    ldpd=no

    nhrpd=no

    eigrpd=no

    babeld=no

    sharpd=no

    pbrd=no

    bfdd=no

    fabricd=no

    vrrpd=no


    vtysh_enable=yes

    zebra_options="  -A 127.0.0.1 -s 90000000"

    bgpd_options="   -A 127.0.0.1"

    ospfd_options="  -A 127.0.0.1"

    ospf6d_options=" -A ::1"

    ripd_options="   -A 127.0.0.1"

    ripngd_options=" -A ::1"

    isisd_options="  -A 127.0.0.1"

    pimd_options="   -A 127.0.0.1"

    ldpd_options="   -A 127.0.0.1"

    nhrpd_options="  -A 127.0.0.1"

    eigrpd_options=" -A 127.0.0.1"

    babeld_options=" -A 127.0.0.1"

    sharpd_options=" -A 127.0.0.1"

    pbrd_options="   -A 127.0.0.1"

    staticd_options="-A 127.0.0.1"

    bfdd_options="   -A 127.0.0.1"

    fabricd_options="-A 127.0.0.1"

    vrrpd_options="  -A 127.0.0.1"

    '
- flow: 'Demo: containerlab parallel lab'
  filename: frr/vtysh.conf
  content: 'service integrated-vtysh-config

    '
- flow: 'Demo: containerlab parallel lab'
  filename: frr/r1.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname r1\nservice integrated-vtysh-config\n!\ninterface lo\n ip\
    \ address 10.255.255.1/32\n!\ninterface eth1\n description to-r2\n ip address 10.0.12.1/30\n!\ninterface eth2\n description\
    \ to-r3\n ip address 10.0.13.1/30\n!\ninterface eth3\n description to-r4\n ip address 10.0.14.1/30\n!\nrouter ospf\n ospf\
    \ router-id 10.255.255.1\n network 10.0.12.0/30 area 0\n network 10.0.13.0/30 area 0\n network 10.0.14.0/30 area 0\n network\
    \ 10.255.255.1/32 area 0\n!\n"
- flow: 'Demo: containerlab parallel lab'
  filename: frr/r2.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname r2\nservice integrated-vtysh-config\n!\ninterface lo\n ip\
    \ address 10.255.255.2/32\n!\ninterface eth1\n description to-r1\n ip address 10.0.12.2/30\n!\ninterface eth2\n description\
    \ to-r3\n ip address 10.0.23.1/30\n!\ninterface eth3\n description to-r4\n ip address 10.0.24.1/30\n!\nrouter ospf\n ospf\
    \ router-id 10.255.255.2\n network 10.0.12.0/30 area 0\n network 10.0.23.0/30 area 0\n network 10.0.24.0/30 area 0\n network\
    \ 10.255.255.2/32 area 0\n!\n"
- flow: 'Demo: containerlab parallel lab'
  filename: frr/r3.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname r3\nservice integrated-vtysh-config\n!\ninterface lo\n ip\
    \ address 10.255.255.3/32\n!\ninterface eth1\n description to-r1\n ip address 10.0.13.2/30\n!\ninterface eth2\n description\
    \ to-r2\n ip address 10.0.23.2/30\n!\ninterface eth3\n description to-r4\n ip address 10.0.34.1/30\n!\nrouter ospf\n ospf\
    \ router-id 10.255.255.3\n network 10.0.13.0/30 area 0\n network 10.0.23.0/30 area 0\n network 10.0.34.0/30 area 0\n network\
    \ 10.255.255.3/32 area 0\n!\n"
- flow: 'Demo: containerlab parallel lab'
  filename: frr/r4.conf
  content: "frr version 9.1\nfrr defaults traditional\nhostname r4\nservice integrated-vtysh-config\n!\ninterface lo\n ip\
    \ address 10.255.255.4/32\n!\ninterface eth1\n description to-r1\n ip address 10.0.14.2/30\n!\ninterface eth2\n description\
    \ to-r2\n ip address 10.0.24.2/30\n!\ninterface eth3\n description to-r3\n ip address 10.0.34.2/30\n!\nrouter ospf\n ospf\
