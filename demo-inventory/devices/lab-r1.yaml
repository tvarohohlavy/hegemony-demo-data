#
# Lab router r1. No access_config: the git provider merges shared SSH
# credentials from its default_access_config, so device files stay
# credential-free. mgmt_host matches the static address assigned in the
# containerlab topology (see src/files/lab/topology.clab.yml).
schema_version: 1
kind: device
external_id: lab-r1
name: lab-r1
mgmt_host: 172.20.30.11
mgmt_port: 22
platform: ios-xe
vendor: FRRouting
model: frr-lab
site: virtual-lab
role: lab-router
tags:
  - lab
  - frr
custom_fields:
  ospf_router_id: 10.255.255.1
